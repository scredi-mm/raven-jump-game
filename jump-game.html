AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==';
  const crunchAudio = new Audio(CRUNCH_SRC);
  crunchAudio.load();

  function playCollectSound() {
    const now = Date.now();
    if (now - lastCollectTime < COMBO_WINDOW) comboCount = Math.min(comboCount + 1, 5);
    else comboCount = 0;
    lastCollectTime = now;

    // Clone the audio so rapid collects can overlap
    const snd = new Audio(CRUNCH_SRC);
    // Slightly faster playback on combos — makes it feel snappier
    snd.playbackRate = 1 + comboCount * 0.08;
    snd.volume = Math.min(1, 0.7 + comboCount * 0.06);
    snd.play().catch(() => {});
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let state = 'waiting';
  let stateTime = 0; // timestamp when state changed (for death buffer)
  let level = 1;
  const LEVELS = {
    1: { speed: 3, obsInterval: 130, appleInterval: 50, smallOnly: true, label: 'Level 1', finishAt: 4000,
         sky: ['#1e3c64','#6aaed6','#b8d8ee'], mountains: ['#7a88a0','#556878'], snow: '#eef2f8',
         ground: ['#9a8560','#7a6040','#3a2010'], ledge: '#4a4035', trail: '#c0a880', pebble: '#8a7860',
         cloudAlpha: 0.8, theme: 'Mountain Morning' },
    2: { speed: 3.5, obsInterval: 110, appleInterval: 45, smallOnly: true, label: 'Level 2', finishAt: 5000,
         sky: ['#ff7b00','#ffb347','#ffe0a0'], mountains: ['#5a3a2a','#3a2518'], snow: '#ffddaa',
         ground: ['#8a6530','#6a4520','#2a1505'], ledge: '#3a2a1a', trail: '#d0a060', pebble: '#7a5830',
         cloudAlpha: 0.5, theme: 'Sunset Canyon' },
    3: { speed: 4, obsInterval: 90,  appleInterval: 35, smallOnly: false, label: 'Level 3', finishAt: 6000,
         sky: ['#0a1628','#1a3050','#2a4a6a'], mountains: ['#1a2a3a','#0e1a28'], snow: '#aaccee',
         ground: ['#4a5060','#3a3a45','#1a1520'], ledge: '#2a2530', trail: '#8888aa', pebble: '#5a5a70',
         cloudAlpha: 0.3, theme: 'Moonlit Ridge' },
    4: { speed: 4.5, obsInterval: 75, appleInterval: 30, smallOnly: false, label: 'Level 4', finishAt: 7000,
         sky: ['#2a0a2a','#5a1a4a','#aa3355'], mountains: ['#3a1a2a','#220a18'], snow: '#ff8888',
         ground: ['#5a2a20','#3a1a10','#1a0a05'], ledge: '#2a1510', trail: '#aa6655', pebble: '#6a3a2a',
         cloudAlpha: 0.2, theme: 'Volcanic Peak' },
  };
  let score = 0, speed = 3, frame = 0;
  let highScore = Math.max(35, parseInt(localStorage.getItem('ravenHighScore') || '35'));
  let obstacles = [], nextObsIn = 90;
  let apples = [], nextAppleIn = 30;
  let trees = [], nextTreeIn = 0;
  let collectFx = []; // sparkle effects when collecting apples
  let confetti = [];  // celebration confetti when finishing a level
  let lavaFlows = []; // lava streams for level 4
  let nextLavaIn = 0;
  let dust = [];
  let cloudX = [50, 250, 500, 680];
  let worldOffset = 0;   // total distance traveled
  let hsx = 200;         // horse screen X — she runs forward!
  let cameraSpeed = 0;   // how fast the camera is "catching up"

  const horse = {
    y: LOWER_Y, targetY: LOWER_Y,
    vy: 0, onGround: true, lane: 0,
    gallopT: 0,
    jumpPhase: 'none', jumpT: 0,
  };

  function reset() {
    horse.y = LOWER_Y; horse.targetY = LOWER_Y;
    horse.vy = 0; horse.onGround = true;
    horse.lane = 0; horse.gallopT = 0;
    horse.jumpPhase = 'none'; horse.jumpT = 0;
    obstacles = []; trees = []; dust = []; apples = []; collectFx = []; confetti = []; lavaFlows = []; nextLavaIn = 0;
    const lv = LEVELS[level];
    score = 0; speed = lv.speed; frame = 0;
    nextObsIn = lv.obsInterval; nextTreeIn = 0; nextAppleIn = lv.appleInterval;
    appleLane = 0; appleGroupsOnLane = 0;
    worldOffset = 0; hsx = 200; cameraSpeed = 0;
    cloudX = [50, 250, 500, 680];
    state = 'playing';
  }

  // ── Input ──────────────────────────────────────────────────────────────────
  let spaceHeld = false;
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      spaceHeld = true;
      if (state === 'playing' && horse.onGround) {
        horse.vy = JUMP_V;
        horse.onGround = false;
        horse.jumpPhase = 'gather'; horse.jumpT = 0;
      }
      // Space to start from waiting screen (uses current level)
      if (state === 'waiting') { reset(); return; }
      // Space to restart after death — but only after 1 second buffer
      if (state === 'dead' && Date.now() - stateTime > 1000) { state = 'waiting'; return; }
    }
    if ((state === 'waiting' || state === 'dead') && ['Digit1','Digit2','Digit3','Digit4'].includes(e.code)) {
      level = parseInt(e.code.charAt(5)); reset(); return;
    }
    if ((e.code === 'Enter' || e.code === 'Space') && state === 'won') {
      if (level < 4) {
        // Advance to next level — keep the apple score!
        const keptScore = score;
        level++; reset();
        score = keptScore;
      } else {
        // Beat all 4 levels! Go back to menu
        state = 'waiting';
      }
      return;
    }
    if (state !== 'playing') return;
    if (e.code === 'ArrowUp' && horse.onGround && horse.lane === 0) {
      horse.lane = 1; horse.targetY = UPPER_Y;
    }
    if (e.code === 'ArrowDown' && horse.onGround && horse.lane === 1) {
      horse.lane = 0; horse.targetY = LOWER_Y;
    }
    if (e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space') spaceHeld = false;
  });
  document.addEventListener('keydown', e => {
    if (e.code === 'KeyC') {
      canvas.requestFullscreen?.() || canvas.webkitRequestFullscreen?.();
    }
    if (e.code === 'KeyB') {
      (document.exitFullscreen?.() || document.webkitExitFullscreen?.());
    }
  });

  canvas.addEventListener('click', () => {
    if (state !== 'playing') return;
    if (horse.onGround) {
      horse.vy = JUMP_V; horse.onGround = false;
      horse.jumpPhase = 'gather'; horse.jumpT = 0;
    }
  });

  // ── Terrain ────────────────────────────────────────────────────────────────
  // Returns a height offset for a given world-x position.
  // Negative = higher on screen (going uphill).
  function terrainShape(wx) {
    // BIG hill: long climb up then down (~25 seconds per full up+down cycle)
    const bigHill = Math.sin(wx * 0.0005) * 50;
    // Medium hills on top of the big one (~8 seconds per cycle)
    const medHills = Math.sin(wx * 0.0015) * 14
                   + Math.sin(wx * 0.0025) * 8;
    // Small bumpy trail texture — rocky mountain path feel
    const bumps = Math.sin(wx * 0.006) * 6
                + Math.sin(wx * 0.012) * 3;
    return bigHill + medHills + bumps;
  }

  // Terrain delta relative to horse position — at horse's screenX this is 0.
  function terrainDelta(screenX) {
    const horseWX = worldOffset + hsx;
    const pointWX = worldOffset + screenX;
    return terrainShape(pointWX) - terrainShape(horseWX);
  }

  function lowerAt(sx) { return LOWER_Y + terrainDelta(sx); }
  function upperAt(sx) { return UPPER_Y + terrainDelta(sx); }

  // ── Background ─────────────────────────────────────────────────────────────

  function drawSky() {
    const lv = LEVELS[level];
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, lv.sky[0]);
    g.addColorStop(0.5, lv.sky[1]);
    g.addColorStop(1, lv.sky[2]);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawClouds() {
    cloudX = cloudX.map((cx, i) => {
      const cy = 28 + i * 16, w = 70 + i * 20;
      ctx.fillStyle = `rgba(255,255,255,${LEVELS[level].cloudAlpha})`;
      ctx.beginPath();
      [[0,0,w*0.3],[w*0.25,-8,w*0.28],[w*0.5,0,w*0.3],[w*0.75,4,w*0.22]]
        .forEach(([dx,dy,r]) => ctx.arc(cx+dx, cy+dy, r, 0, Math.PI*2));
      ctx.fill();
      return (cx - speed * 0.1) < -w - 20 ? W + w + Math.random() * 200 : cx - speed * 0.1;
    });
  }

  let mOff = 0;
  function drawMountains() {
    mOff = (mOff + speed * 0.04) % W;
    const lv = LEVELS[level];
    // Far peaks
    const far = [[0,185],[50,95],[110,145],[200,70],[300,120],[400,50],[490,110],[600,40],[700,100],[800,70],[800,H],[0,H]];
    ctx.fillStyle = lv.mountains[0];
    drawPoly(far, -mOff*0.3); drawPoly(far, W-mOff*0.3);
    // Snow caps
    ctx.fillStyle = lv.snow;
    [[50,95],[200,70],[400,50],[600,40],[700,100]].forEach(([px,py]) => {
      const sx = ((px - mOff*0.3) % W + W) % W;
      ctx.beginPath(); ctx.ellipse(sx, py+10, 20, 15, 0, 0, Math.PI*2); ctx.fill();
    });
    // Mid peaks
    const mid = [[0,220],[80,155],[170,195],[280,125],[370,175],[470,135],[560,185],[660,145],[760,170],[800,190],[800,H],[0,H]];
    ctx.fillStyle = lv.mountains[1];
    drawPoly(mid, -mOff*0.6); drawPoly(mid, W-mOff*0.6);

    // Volcanic eruption glow on level 4
    if (level === 4) {
      // Lava streams down the two tallest peaks
      const peaks = [[200,70],[400,50]];
      peaks.forEach(([px,py]) => {
        const sx = ((px - mOff*0.3) % W + W) % W;
        // Glowing crater
        const craterGlow = ctx.createRadialGradient(sx, py + 5, 3, sx, py + 5, 30);
        craterGlow.addColorStop(0, 'rgba(255,150,0,0.6)');
        craterGlow.addColorStop(1, 'rgba(255,50,0,0)');
        ctx.fillStyle = craterGlow;
        ctx.beginPath(); ctx.arc(sx, py + 5, 30, 0, Math.PI * 2); ctx.fill();
        // Lava stream down the mountainside
        const t = frame * 0.03;
        ctx.strokeStyle = `rgba(255,${80 + Math.sin(t) * 40},0,0.5)`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(sx, py + 10);
        ctx.quadraticCurveTo(sx + 15, py + 50, sx + 8, py + 100);
        ctx.quadraticCurveTo(sx + 20, py + 130, sx + 12, py + 160);
        ctx.stroke();
        // Second stream
        ctx.beginPath();
        ctx.moveTo(sx - 3, py + 12);
        ctx.quadraticCurveTo(sx - 18, py + 60, sx - 10, py + 110);
        ctx.quadraticCurveTo(sx - 22, py + 140, sx - 15, py + 170);
        ctx.stroke();
      });
    }
  }

  function drawPoly(pts, ox) {
    ctx.save(); ctx.translate(ox, 0); ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  // ── Terrain drawing ────────────────────────────────────────────────────────

  function drawUpperLedge() {
    // Cliff face fill (from upper path down ~45px)
    ctx.fillStyle = LEVELS[level].ledge;
    ctx.beginPath();
    ctx.moveTo(0, upperAt(0));
    for (let sx = 0; sx <= W; sx += 8) ctx.lineTo(sx, upperAt(sx));
    for (let sx = W; sx >= 0; sx -= 8) ctx.lineTo(sx, upperAt(sx) + 45);
    ctx.closePath();
    ctx.fill();

    // Ledge face gradient
    const grd = ctx.createLinearGradient(0, 0, 0, 45);
    grd.addColorStop(0, 'rgba(100,85,65,0.9)');
    grd.addColorStop(0.4, 'rgba(65,48,30,0.9)');
    grd.addColorStop(1, 'rgba(35,20,5,0.7)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(0, upperAt(0) + 2);
    for (let sx = 0; sx <= W; sx += 8) ctx.lineTo(sx, upperAt(sx) + 2);
    for (let sx = W; sx >= 0; sx -= 8) ctx.lineTo(sx, upperAt(sx) + 45);
    ctx.closePath();
    ctx.fill();

    // Surface trail line
    ctx.strokeStyle = LEVELS[level].trail;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, upperAt(0));
    for (let sx = 0; sx <= W; sx += 6) ctx.lineTo(sx, upperAt(sx));
    ctx.stroke();

    // Pebbles
    ctx.fillStyle = LEVELS[level].pebble;
    for (let i = 0; i < 10; i++) {
      const px = ((i * 85 + frame * speed * 0.25) % (W + 20)) - 10;
      ctx.beginPath();
      ctx.ellipse(px, upperAt(px) + 4, 3, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawLowerGround() {
    // Fill from lower terrain to bottom of canvas
    const lv = LEVELS[level];
    const grd = ctx.createLinearGradient(0, LOWER_Y - 20, 0, H);
    grd.addColorStop(0, lv.ground[0]);
    grd.addColorStop(0.15, lv.ground[1]);
    grd.addColorStop(1, lv.ground[2]);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(0, lowerAt(0));
    for (let sx = 0; sx <= W; sx += 8) ctx.lineTo(sx, lowerAt(sx));
    ctx.lineTo(W, H); ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // Trail surface line
    ctx.strokeStyle = LEVELS[level].trail;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, lowerAt(0));
    for (let sx = 0; sx <= W; sx += 6) ctx.lineTo(sx, lowerAt(sx));
    ctx.stroke();

    // Pebbles
    ctx.fillStyle = lv.pebble;
    for (let i = 0; i < 14; i++) {
      const px = ((i * 62 + frame * speed * 0.28) % (W + 20)) - 10;
      const py = lowerAt(px) + 6 + (i % 4) * 4;
      ctx.beginPath();
      ctx.ellipse(px, py, 4 + (i % 2), 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Trees ──────────────────────────────────────────────────────────────────

  function spawnTree() {
    trees.push({
      x: W + 40 + Math.random() * 80,
      type: Math.random() < 0.55 ? 'pine' : 'oak',
      size: 90 + Math.random() * 70,
      lane: Math.random() < 0.7 ? 0 : 1,
    });
  }

  function drawPineTree(sx, sy, size) {
    // Trunk
    ctx.fillStyle = '#4a2a15';
    const tw = size * 0.07;
    ctx.fillRect(sx - tw, sy - size * 0.18, tw * 2, size * 0.18);

    // 3 foliage layers
    for (let i = 0; i < 3; i++) {
      const ly = sy - size * 0.18 - i * size * 0.22;
      const lw = size * (0.36 - i * 0.08);
      const lh = size * 0.28;
      // Shadow layer
      ctx.fillStyle = ['#15401a', '#1a4c1f', '#1f5825'][i];
      ctx.beginPath();
      ctx.moveTo(sx, ly - lh);
      ctx.lineTo(sx - lw, ly);
      ctx.lineTo(sx + lw, ly);
      ctx.closePath();
      ctx.fill();
      // Highlight
      ctx.fillStyle = ['#1e5522', '#26652a', '#2e7832'][i];
      ctx.beginPath();
      ctx.moveTo(sx - 2, ly - lh + 4);
      ctx.lineTo(sx - lw * 0.6, ly - 2);
      ctx.lineTo(sx + 2, ly - lh + 4);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawOakTree(sx, sy, size) {
    // Trunk
    ctx.fillStyle = '#5a3a20';
    const tw = size * 0.06;
    ctx.fillRect(sx - tw, sy - size * 0.22, tw * 2, size * 0.22);

    // Branch hints
    ctx.strokeStyle = '#4a2a15';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx - tw, sy - size * 0.15);
    ctx.lineTo(sx - size * 0.12, sy - size * 0.28);
    ctx.moveTo(sx + tw, sy - size * 0.14);
    ctx.lineTo(sx + size * 0.15, sy - size * 0.26);
    ctx.stroke();

    // Canopy puffs
    const cy = sy - size * 0.38;
    const puffs = [
      [0, 0, size * 0.2],
      [-size * 0.14, 0.04 * size, size * 0.17],
      [size * 0.14, 0.04 * size, size * 0.17],
      [0, -size * 0.11, size * 0.17],
      [-size * 0.08, -size * 0.07, size * 0.14],
      [size * 0.1, -size * 0.05, size * 0.15],
    ];
    // Dark canopy
    ctx.fillStyle = '#1e5518';
    puffs.forEach(([dx, dy, r]) => {
      ctx.beginPath(); ctx.arc(sx+dx, cy+dy+3, r, 0, Math.PI*2); ctx.fill();
    });
    // Main canopy
    ctx.fillStyle = '#2a6a22';
    puffs.forEach(([dx, dy, r]) => {
      ctx.beginPath(); ctx.arc(sx+dx, cy+dy, r, 0, Math.PI*2); ctx.fill();
    });
    // Highlights
    ctx.fillStyle = '#3a8a30';
    puffs.slice(0, 3).forEach(([dx, dy, r]) => {
      ctx.beginPath(); ctx.arc(sx+dx-2, cy+dy-3, r*0.55, 0, Math.PI*2); ctx.fill();
    });
  }

  function drawTrees() {
    trees.forEach(t => {
      const groundY = t.lane === 0 ? lowerAt(t.x) : upperAt(t.x);
      if (t.type === 'pine') drawPineTree(t.x, groundY, t.size);
      else drawOakTree(t.x, groundY, t.size);
    });
  }

  // ── Dust particles ─────────────────────────────────────────────────────────

  function emitDust() {
    if (!horse.onGround) return;
    for (let i = 0; i < 2; i++) {
      dust.push({
        x: hsx - 42 + Math.random() * 10,
        y: horse.y - 2 + Math.random() * 4,
        vx: -1.5 - Math.random() * 2.5,
        vy: -Math.random() * 1.8,
        life: 1,
        size: 2 + Math.random() * 3.5,
      });
    }
  }

  function updateDust() {
    dust.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.04;
      p.life -= 0.025;
      p.size *= 0.985;
    });
    dust = dust.filter(p => p.life > 0);
  }

  function drawDust() {
    dust.forEach(p => {
      ctx.fillStyle = `rgba(160,140,100,${p.life * 0.5})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // ── Apples ───────────────────────────────────────────────────────────────

  let appleLane = 0;         // which lane apples are currently spawning on
  let appleGroupsOnLane = 0; // how many groups have spawned on this lane
  const GROUPS_BEFORE_SWITCH = 3; // spawn 3 groups then switch lanes

  function spawnApples() {
    // After a few groups on one lane, switch to the other lane
    appleGroupsOnLane++;
    if (appleGroupsOnLane > GROUPS_BEFORE_SWITCH) {
      appleLane = appleLane === 0 ? 1 : 0;
      appleGroupsOnLane = 1;
    }

    const floatH = 40 + Math.random() * 15;  // all apples at same easy height — grab while running

    // Spawn a cluster of 1-4 apples in a line
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      apples.push({
        x: W + 30 + i * 32,
        lane: appleLane,
        floatH: floatH,
        bob: Math.random() * Math.PI * 2, // bobbing phase offset
        size: 10 + Math.random() * 3,
      });
    }
  }

  function drawApple(ax, ay, size, bob) {
    const by = Math.sin(bob) * 3; // gentle floating bob
    const cy = ay + by;

    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(ax, ay + size + 4 - by, size * 0.6, 3, 0, 0, Math.PI*2); ctx.fill();

    // Apple body — red with gradient feel
    ctx.fillStyle = '#cc1122';
    ctx.beginPath(); ctx.arc(ax, cy, size, 0, Math.PI*2); ctx.fill();

    // Darker red side
    ctx.fillStyle = '#991018';
    ctx.beginPath(); ctx.arc(ax + size*0.25, cy + size*0.15, size*0.75, 0, Math.PI*2); ctx.fill();

    // Main red body again on top
    ctx.fillStyle = '#dd2233';
    ctx.beginPath(); ctx.arc(ax - size*0.1, cy - size*0.1, size*0.7, 0, Math.PI*2); ctx.fill();

    // Highlight shine
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath(); ctx.ellipse(ax - size*0.25, cy - size*0.3, size*0.28, size*0.22, -0.4, 0, Math.PI*2); ctx.fill();

    // Stem
    ctx.strokeStyle = '#4a2a08';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ax, cy - size);
    ctx.quadraticCurveTo(ax + 3, cy - size - 5, ax + 1, cy - size - 8);
    ctx.stroke();

    // Tiny leaf
    ctx.fillStyle = '#3a8828';
    ctx.beginPath();
    ctx.moveTo(ax + 1, cy - size - 5);
    ctx.quadraticCurveTo(ax + 8, cy - size - 10, ax + 6, cy - size - 3);
    ctx.quadraticCurveTo(ax + 3, cy - size - 5, ax + 1, cy - size - 5);
    ctx.fill();
  }

  function drawApples() {
    apples.forEach(a => {
      const groundY = a.lane === 0 ? lowerAt(a.x) : upperAt(a.x);
      const ay = groundY - a.floatH;
      drawApple(a.x, ay, a.size, a.bob);
    });
  }

  function checkAppleCollect() {
    // Horse body box: from head (horse.y - 100) to hooves (horse.y)
    const hLeft = hsx - 30, hRight = hsx + 54;
    const hTop = horse.y - 105, hBot = horse.y + 5;
    const pad = 18; // forgiving padding around hitbox
    apples = apples.filter(a => {
      if (a.lane !== horse.lane) return true;
      const groundY = a.lane === 0 ? lowerAt(a.x) : upperAt(a.x);
      const ay = groundY - a.floatH;
      // Rectangle overlap: is the apple inside (or near) Raven's body?
      const hit = a.x > hLeft - pad && a.x < hRight + pad
               && ay > hTop - pad && ay < hBot + pad;
      if (hit) {
        // Collected!
        score++;
        playCollectSound();
        // Spawn sparkle effect
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          collectFx.push({
            x: a.x, y: ay,
            vx: Math.cos(angle) * (2 + Math.random() * 2),
            vy: Math.sin(angle) * (2 + Math.random() * 2) - 1,
            life: 1,
            size: 2 + Math.random() * 2,
          });
        }
        return false;
      }
      return true;
    });
  }

  function updateCollectFx() {
    collectFx.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.06;
      p.life -= 0.04;
      p.size *= 0.97;
    });
    collectFx = collectFx.filter(p => p.life > 0);
  }

  function drawCollectFx() {
    collectFx.forEach(p => {
      ctx.fillStyle = `rgba(255,215,0,${p.life})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,255,200,${p.life * 0.6})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI*2); ctx.fill();
    });
  }

  // ── Confetti celebration ────────────────────────────────────────────────────

  const CONFETTI_COLORS = ['#ff4444','#44dd44','#4488ff','#ffdd00','#ff88dd','#44ffee','#ffaa22'];

  function spawnConfetti() {
    confetti = [];
    for (let i = 0; i < 80; i++) {
      confetti.push({
        x: Math.random() * W,
        y: -20 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 4,
        vy: 1.5 + Math.random() * 3,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.2,
        w: 6 + Math.random() * 6,
        h: 4 + Math.random() * 4,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        life: 1,
      });
    }
  }

  function updateConfetti() {
    confetti.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.03; // gentle gravity
      p.vx += (Math.random() - 0.5) * 0.3; // flutter
      p.rot += p.rotV;
      if (p.y > H + 20) p.life = 0;
    });
    confetti = confetti.filter(p => p.life > 0);
  }

  function drawConfetti() {
    confetti.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
  }

  // ── Lava (Level 4 only) ────────────────────────────────────────────────────

  function spawnLava() {
    const lane = Math.random() < 0.5 ? 0 : 1;
    // Pick a random mountain peak Y to flow from (between 50-120 = mountain area)
    const peakY = 40 + Math.random() * 60;
    // Slight horizontal wobble for the stream path
    const wobble = (Math.random() - 0.5) * 30;
    lavaFlows.push({
      x: W + 60,
      lane: lane,
      peakY: peakY,       // where the stream starts (mountain peak)
      wobble: wobble,      // how much the stream curves sideways
      w: 45 + Math.random() * 35,   // width of pool at the bottom
      glow: Math.random() * 6,
    });
  }

  function drawLava() {
    lavaFlows.forEach(lv => {
      const groundY = lv.lane === 0 ? lowerAt(lv.x + lv.w/2) : upperAt(lv.x + lv.w/2);
      const poolCX = lv.x + lv.w / 2;
      const t = lv.glow;

      // ── Flowing stream from mountain peak down to trail ──
      const streamTop = lv.peakY;
      const streamBot = groundY - 2;
      const streamH = streamBot - streamTop;

      // Draw stream as stacked ellipses — same technique as the pool
      // Each slice is a little ellipse: red outside, orange middle, yellow core
      for (let i = 0; i <= 20; i++) {
        const frac = i / 20;
        const y = streamTop + frac * streamH;
        const wx = Math.sin(frac * 3 + t * 0.5) * lv.wobble * frac;
        const cx = poolCX + wx;
        const r = 2 + frac * frac * 11; // radius grows toward bottom

        // Glow
        ctx.fillStyle = 'rgba(255,60,0,0.15)';
        ctx.beginPath(); ctx.ellipse(cx, y, r * 2, r * 0.8, 0, 0, Math.PI * 2); ctx.fill();
        // Red outer
        ctx.fillStyle = '#dd2200';
        ctx.beginPath(); ctx.ellipse(cx, y, r, r * 0.45, 0, 0, Math.PI * 2); ctx.fill();
        // Orange middle
        ctx.fillStyle = '#ff6600';
        ctx.beginPath(); ctx.ellipse(cx, y, r * 0.65, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
        // Yellow-hot core
        ctx.fillStyle = '#ffcc22';
        ctx.beginPath(); ctx.ellipse(cx, y, r * 0.3, r * 0.15, 0, 0, Math.PI * 2); ctx.fill();
      }

      // ── Glow at the source (crater) ──
      const craterGlow = ctx.createRadialGradient(poolCX, streamTop, 2, poolCX, streamTop, 20);
      craterGlow.addColorStop(0, 'rgba(255,200,50,0.6)');
      craterGlow.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = craterGlow;
      ctx.beginPath(); ctx.arc(poolCX, streamTop, 20, 0, Math.PI * 2); ctx.fill();

      // ── Lava pool at the bottom ──
      // Glow around pool
      const poolGlow = ctx.createRadialGradient(poolCX, groundY, 3, poolCX, groundY, lv.w * 0.6);
      poolGlow.addColorStop(0, 'rgba(255,100,0,0.35)');
      poolGlow.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = poolGlow;
      ctx.fillRect(poolCX - lv.w * 0.6, groundY - lv.w * 0.4, lv.w * 1.2, lv.w * 0.6);

      // Pool shape
      ctx.fillStyle = '#dd2200';
      ctx.beginPath();
      ctx.ellipse(poolCX, groundY - 2, lv.w / 2, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bright center
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.ellipse(poolCX, groundY - 3, lv.w / 3, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Hot core
      ctx.fillStyle = '#ffcc22';
      ctx.beginPath();
      ctx.ellipse(poolCX, groundY - 4, lv.w / 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Bubbles in the pool
      lv.glow += 0.06;
      for (let i = 0; i < 3; i++) {
        const bx = poolCX + Math.sin(t + i * 2.1) * lv.w * 0.25;
        const by = groundY - 4 + Math.sin(t * 1.5 + i) * 2;
        ctx.fillStyle = 'rgba(255,200,50,0.6)';
        ctx.beginPath(); ctx.arc(bx, by, 1.5 + Math.sin(t + i) * 1, 0, Math.PI * 2); ctx.fill();
      }

      // Smoke rising from the pool
      for (let i = 0; i < 2; i++) {
        const sx = poolCX - 8 + i * 16;
        const smokeY = groundY - 12 - Math.sin(t + i * 1.5) * 8;
        ctx.fillStyle = `rgba(60,20,0,${0.12 + Math.sin(t + i) * 0.06})`;
        ctx.beginPath(); ctx.arc(sx, smokeY, 4 + Math.sin(t) * 2, 0, Math.PI * 2); ctx.fill();
      }
    });
  }

  function checkLavaCollision() {
    for (const lv of lavaFlows) {
      if (lv.lane !== horse.lane) continue;
      const hx = hsx - 20, hw = 60;
      const poolLeft = lv.x, poolRight = lv.x + lv.w;
      if (hx < poolRight && hx + hw > poolLeft && horse.onGround) {
        return true;
      }
    }
    return false;
  }

  // ── Obstacles ──────────────────────────────────────────────────────────────

  function drawBoulder(x, y, w, h) {
    const cx = x+w*0.5, cy = y+h*0.55;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(cx, y+h+3, w*0.45, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#686868';
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.5, h*0.48, 0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#808080';
    ctx.beginPath(); ctx.ellipse(cx-w*0.08, cy-h*0.05, w*0.38, h*0.36, -0.1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c0c0c0';
    ctx.beginPath(); ctx.ellipse(cx-w*0.18, cy-h*0.22, w*0.14, h*0.1, -0.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e8e8e8';
    ctx.beginPath(); ctx.ellipse(cx-w*0.2, cy-h*0.28, w*0.06, h*0.04, -0.4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#404040'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx+w*0.05, cy-h*0.1); ctx.lineTo(cx+w*0.15, cy+h*0.12);
    ctx.lineTo(cx+w*0.08, cy+h*0.25); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-w*0.1, cy+h*0.05); ctx.lineTo(cx-w*0.02, cy+h*0.2); ctx.stroke();
    ctx.fillStyle = 'rgba(60,90,40,0.55)';
    ctx.beginPath(); ctx.ellipse(cx-w*0.2, y+h-4, w*0.18, 6, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+w*0.15, y+h-2, w*0.12, 4, -0.2, 0, Math.PI*2); ctx.fill();
    if (w > 50) { ctx.fillStyle = 'rgba(240,245,255,0.85)'; ctx.beginPath(); ctx.ellipse(cx-w*0.08, y+h*0.18, w*0.28, h*0.12, -0.3, 0, Math.PI*2); ctx.fill(); }
  }

  function drawLog(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h+3, w*0.45, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6B3A1F';
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 5); ctx.fill();
    ctx.fillStyle = '#8B5A35';
    ctx.beginPath(); ctx.roundRect(x+2, y+2, w-4, h*0.35, [4,4,0,0]); ctx.fill();
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      ctx.strokeStyle = i%2===0 ? '#4a2410' : '#7a4828';
      const ly = y+4+i*(h-6)/6;
      ctx.beginPath(); ctx.moveTo(x+12, ly);
      ctx.bezierCurveTo(x+w*0.3, ly+2, x+w*0.7, ly-2, x+w-12, ly); ctx.stroke();
    }
    ctx.fillStyle = '#3a1808';
    ctx.beginPath(); ctx.ellipse(x+w*0.55, y+h*0.38, 5, 4, 0.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+w*0.3, y+h*0.7, 4, 3, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9B6040';
    ctx.beginPath(); ctx.ellipse(x+7, y+h/2, 7, h/2-2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#7a4828'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(x+7, y+h/2, 5, h/2-5, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x+7, y+h/2, 3, h/2-8, 0, 0, Math.PI*2); ctx.stroke();
  }

  // ══════════════════════════════════════════════════════════════════════════
  // ██  RAVEN — Bezier silhouette horse with biomechanical animation      ██
  // ══════════════════════════════════════════════════════════════════════════

  const GALLOP_FRONT = [
    [ 55, -20,  20], [ 35, -10,  10], [ 10,   5,   5], [-15,  10,  10],
    [-35,  15,  30], [-40,  60,  50], [-10,  80,  60], [ 30,  40,  35],
  ];
  const GALLOP_HIND = [
    [-30,  10,  15], [-40,  50,  45], [-20,  70,  55], [ 15,  45,  30],
    [ 40, -15,  15], [ 25,  -5,   8], [  5,   8,   5], [-15,  10,  12],
  ];
  const JUMP_POSES = {
    gather:  { front: [10, 20, 15],  hind: [30, 40, 30],  tilt: 0.08 },
    launch:  { front: [60, -15, 20], hind: [-45, 15, 25], tilt: -0.35 },
    tuck:    { front: [30, 70, 60],  hind: [20, 70, 55],  tilt: -0.05 },
    extend:  { front: [50, -20, 10], hind: [-10, 50, 40], tilt: 0.15 },
    land:    { front: [15, 15, 20],  hind: [5, 15, 10],   tilt: 0.12 },
  };

  function getGallopLeg(kf, t) {
    const fi = t * 8, i0 = Math.floor(fi) % 8, i1 = (i0+1) % 8, f = fi - Math.floor(fi);
    return [lerp(kf[i0][0], kf[i1][0], f), lerp(kf[i0][1], kf[i1][1], f), lerp(kf[i0][2], kf[i1][2], f)];
  }

  function drawArticulatedLeg(ox, oy, shoulder, knee, fetlock, segs, color) {
    const [uL, lL, cL] = segs;
    const sa = deg(shoulder), ka = deg(knee), fa = deg(fetlock);
    ctx.save(); ctx.translate(ox, oy);
    // Upper leg — tapered, muscular
    ctx.rotate(sa);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(-4,uL); ctx.lineTo(4,uL); ctx.lineTo(5,0); ctx.closePath(); ctx.fill();
    // Knee joint bulge
    ctx.translate(0, uL); ctx.rotate(ka);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0, 0, 5.5, 4, 0, 0, Math.PI*2); ctx.fill();
    // Lower leg — thinner
    ctx.beginPath(); ctx.moveTo(-3.5,0); ctx.lineTo(-3,lL); ctx.lineTo(3,lL); ctx.lineTo(3.5,0); ctx.closePath(); ctx.fill();
    // Fetlock joint
    ctx.translate(0, lL); ctx.rotate(fa);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0, 0, 4, 3.5, 0, 0, Math.PI*2); ctx.fill();
    // Cannon/pastern — slender
    ctx.beginPath(); ctx.moveTo(-3,0); ctx.lineTo(-2.5,cL); ctx.lineTo(2.5,cL); ctx.lineTo(3,0); ctx.closePath(); ctx.fill();
    // Hoof — hard, defined shape
    ctx.translate(0, cL);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(0, 2, 6, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── BODY — anatomically shaped bezier silhouette (~1.4x larger) ──────────

  function drawRavenBody(x, y, tilt) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(tilt);

    // Main body silhouette — follows real horse anatomy
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath();
    ctx.moveTo(34, -30);                                     // girth (front-bottom)
    ctx.bezierCurveTo(38, -42, 38, -58, 30, -70);           // chest rising to shoulder
    ctx.bezierCurveTo(24, -80, 16, -86, 10, -88);           // shoulder to withers peak
    ctx.bezierCurveTo(0, -86, -14, -84, -26, -82);          // withers across the back
    ctx.bezierCurveTo(-36, -80, -44, -76, -48, -70);        // loin to croup (hip peak)
    ctx.bezierCurveTo(-54, -60, -56, -48, -54, -38);        // rump curves down
    ctx.bezierCurveTo(-52, -30, -46, -26, -38, -24);        // under rump to thigh
    ctx.bezierCurveTo(-26, -22, -10, -22, 8, -24);          // belly (tucked up at flank)
    ctx.bezierCurveTo(18, -25, 28, -27, 34, -30);           // girth back to start
    ctx.closePath(); ctx.fill();

    // Shoulder muscle
    ctx.fillStyle = '#1c1c1c';
    ctx.beginPath(); ctx.ellipse(22, -54, 16, 14, -0.4, 0, Math.PI*2); ctx.fill();
    // Haunch muscle
    ctx.beginPath(); ctx.ellipse(-40, -50, 14, 13, 0.3, 0, Math.PI*2); ctx.fill();
    // Barrel ribcage highlight
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(-6, -52, 24, 16, -0.08, 0, Math.PI*2); ctx.fill();
    // Topline sheen (glossy coat along the back)
    ctx.fillStyle = '#303030';
    ctx.beginPath();
    ctx.moveTo(26, -84); ctx.bezierCurveTo(12, -88, -8, -86, -22, -84);
    ctx.bezierCurveTo(-36, -82, -44, -78, -48, -72);
    ctx.bezierCurveTo(-44, -76, -36, -80, -22, -82);
    ctx.bezierCurveTo(-8, -84, 12, -86, 26, -82);
    ctx.closePath(); ctx.fill();
    // Specular highlight (wet/glossy look)
    ctx.fillStyle = '#383838';
    ctx.beginPath(); ctx.ellipse(4, -84, 18, 4, -0.1, 0, Math.PI*2); ctx.fill();
    // Chest definition
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(36, -48, 8, 18, 0.2, 0, Math.PI*2); ctx.fill();
    // Belly shadow
    ctx.fillStyle = '#080808';
    ctx.beginPath(); ctx.ellipse(-6, -25, 30, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── HEAD & NECK — thick muscular arched neck, refined head ────────────────

  function drawRavenHead(x, y, tilt) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(tilt);

    // Neck — thick, muscular, arched
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath();
    ctx.moveTo(28, -70);                                     // base at withers/shoulder
    ctx.bezierCurveTo(38, -80, 48, -95, 54, -112);          // front of neck (jugular side)
    ctx.bezierCurveTo(56, -118, 56, -124, 52, -122);        // crest at poll
    ctx.bezierCurveTo(46, -118, 38, -104, 30, -88);         // back of neck (mane side)
    ctx.closePath(); ctx.fill();
    // Neck muscle definition
    ctx.fillStyle = '#1e1e1e';
    ctx.beginPath(); ctx.ellipse(42, -100, 9, 20, 0.35, 0, Math.PI*2); ctx.fill();
    // Neck sheen
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath(); ctx.ellipse(44, -104, 6, 16, 0.3, 0, Math.PI*2); ctx.fill();
    // Jugular groove (subtle dark line)
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(34, -76); ctx.bezierCurveTo(42, -88, 50, -100, 53, -112);
    ctx.stroke();

    // Head — long, refined face
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath();
    ctx.moveTo(52, -122);                                    // poll
    ctx.bezierCurveTo(58, -126, 66, -124, 72, -118);        // forehead
    ctx.bezierCurveTo(78, -112, 82, -104, 82, -98);         // bridge of nose
    ctx.bezierCurveTo(82, -92, 80, -88, 76, -87);           // muzzle
    ctx.bezierCurveTo(70, -86, 64, -88, 60, -94);           // jaw
    ctx.bezierCurveTo(56, -98, 52, -108, 50, -116);         // cheek to throatlatch
    ctx.bezierCurveTo(50, -118, 51, -122, 52, -122);        // back to poll
    ctx.closePath(); ctx.fill();
    // Cheekbone highlight
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(64, -106, 10, 8, -0.2, 0, Math.PI*2); ctx.fill();
    // Head sheen
    ctx.fillStyle = '#282828';
    ctx.beginPath(); ctx.ellipse(68, -114, 6, 4, -0.3, 0, Math.PI*2); ctx.fill();
    // Muzzle — slightly warmer
    ctx.fillStyle = '#181818';
    ctx.beginPath(); ctx.ellipse(80, -94, 8, 7, 0.1, 0, Math.PI*2); ctx.fill();
    // Nostrils
    ctx.fillStyle = '#3a1015';
    ctx.beginPath(); ctx.ellipse(83, -92, 4, 2.8, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a0a10';
    ctx.beginPath(); ctx.ellipse(81, -91, 3, 2, 0.5, 0, Math.PI*2); ctx.fill();

    // Eye — big, expressive (Raven style)
    ctx.fillStyle = '#f4f0ec';
    ctx.beginPath(); ctx.ellipse(64, -116, 6.5, 5, -0.12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a1a08';
    ctx.beginPath(); ctx.ellipse(65, -116, 4.5, 4.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0a0400';
    ctx.beginPath(); ctx.ellipse(65.5, -116, 2.5, 2.8, 0, 0, Math.PI*2); ctx.fill();
    // Life spark
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(67, -117.5, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(63.5, -114.5, 0.8, 0, Math.PI*2); ctx.fill();
    // Eyelid/lash
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(64, -116, 6.5, 0.3, Math.PI-0.3); ctx.stroke();
    ctx.strokeStyle = '#050505'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(64, -116, 7, -0.7, -2.4, true); ctx.stroke();

    // Ears
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.moveTo(52,-122); ctx.bezierCurveTo(48,-132,49,-140,53,-144);
    ctx.bezierCurveTo(56,-140,57,-132,56,-124); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath(); ctx.moveTo(56,-122); ctx.bezierCurveTo(54,-132,55,-141,59,-146);
    ctx.bezierCurveTo(63,-141,63,-132,60,-124); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2a0808';
    ctx.beginPath(); ctx.moveTo(57,-124); ctx.bezierCurveTo(55,-132,56,-139,59,-143);
    ctx.bezierCurveTo(62,-139,62,-132,59,-125); ctx.closePath(); ctx.fill();

    ctx.restore();
  }

  // ── MANE — 16 flowing strands + forelock ──────────────────────────────────

  function drawMane(x, y, tilt, gT, moving) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(tilt);
    ctx.lineCap = 'round';

    // 16 strands along the crest of the neck (poll to withers)
    for (let i = 0; i < 16; i++) {
      const t = i / 15;
      const ax = lerp(56, 30, t);
      const ay = lerp(-128, -82, t);
      const w = moving ? Math.sin(gT*Math.PI*2 + i*0.7) * (5 + t*9) : 0;
      const w2 = moving ? Math.cos(gT*Math.PI*1.6 + i*1.1) * (3 + t*5) : 0;
      const endX = ax - 16 - t*14 + w;
      const endY = ay - 4 - t*3 + w2;
      ctx.strokeStyle = ['#0a0a0a','#151515','#0e0e0e','#121212'][i % 4];
      ctx.lineWidth = 3.2 - t * 1.2;
      ctx.beginPath(); ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(ax - 8 + w*0.4, ay - 10, endX, endY);
      ctx.stroke();
    }

    // Forelock (bangs between the ears)
    for (let i = 0; i < 5; i++) {
      const w = moving ? Math.sin(gT*Math.PI*2.5 + i*1.4) * 3 : 0;
      ctx.strokeStyle = i%2===0 ? '#0a0a0a' : '#121212';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(55 + i*1.5, -124);
      ctx.quadraticCurveTo(60 + w, -119, 63 + w + i, -112);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── TAIL — 10 thick flowing strands ───────────────────────────────────────

  function drawTailHair(x, y, tilt, gT, moving) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(tilt);
    ctx.lineCap = 'round';
    const bx = -54, by = -44;
    for (let i = 0; i < 10; i++) {
      const sp = (i - 4.5) * 5;
      const w = moving ? Math.sin(gT*Math.PI*1.2 + i*0.7) * 16 : 0;
      const w2 = moving ? Math.cos(gT*Math.PI*1.5 + i*1.0) * 8 : 0;
      ctx.strokeStyle = ['#0a0a0a','#121212','#0e0e0e'][i % 3];
      ctx.lineWidth = 3.8 - Math.abs(i - 4.5) * 0.4;
      ctx.beginPath(); ctx.moveTo(bx, by);
      ctx.bezierCurveTo(
        bx-20+w*0.3+sp*0.3, by+20,
        bx-34+w+sp*0.5, by+44+w2,
        bx-42+w*1.4+sp, by+70+w2
      );
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── FULL HORSE RENDER ─────────────────────────────────────────────────────

  function drawRaven(x, y, gT, jp, jt, moving) {
    let tilt = 0, bob = 0;
    if (jp !== 'none') {
      const p = JUMP_POSES[jp]; tilt = p ? p.tilt : 0;
    } else if (moving) {
      bob = Math.sin(gT * Math.PI * 4) * 3.5;
      tilt = Math.sin(gT * Math.PI * 2) * 0.03;
    }
    const dy = y + bob;

    let fl, fr, hl, hr;
    if (jp !== 'none') {
      const p = JUMP_POSES[jp] || { front:[10,0,5], hind:[0,5,5] };
      fl = p.front; fr = [p.front[0]-10, p.front[1]+5, p.front[2]];
      hl = p.hind;  hr = [p.hind[0]-8, p.hind[1]+5, p.hind[2]];
    } else if (moving) {
      fl = getGallopLeg(GALLOP_FRONT, gT);
      fr = getGallopLeg(GALLOP_FRONT, (gT+0.12)%1);
      hl = getGallopLeg(GALLOP_HIND, gT);
      hr = getGallopLeg(GALLOP_HIND, (gT+0.12)%1);
    } else {
      fl = [10,0,5]; fr = [5,2,5]; hl = [-5,5,5]; hr = [-8,8,5];
    }

    // Bigger leg segments for larger horse
    const fSegs = [18,15,12], hSegs = [20,16,12];
    const ct = Math.cos(tilt), st = Math.sin(tilt);
    const rp = (rx,ry) => [x+rx*ct-ry*st, dy+rx*st+ry*ct];

    // Leg attachment points on the larger body
    const [flx,fly] = rp(28,-26), [frx,fry] = rp(32,-26);
    const [hlx,hly] = rp(-36,-24), [hrx,hry] = rp(-32,-24);

    // Draw order: far legs, tail, body, head, mane, near legs
    drawArticulatedLeg(hlx, hly, hl[0], hl[1], hl[2], hSegs, '#0a0a0a');
    drawArticulatedLeg(flx, fly, fl[0], fl[1], fl[2], fSegs, '#0a0a0a');
    drawTailHair(x, dy, tilt, gT, moving);
    drawRavenBody(x, dy, tilt);
    drawRavenHead(x, dy, tilt);
    drawMane(x, dy, tilt, gT, moving);
    drawArticulatedLeg(hrx, hry, hr[0], hr[1], hr[2], hSegs, '#141414');
    drawArticulatedLeg(frx, fry, fr[0], fr[1], fr[2], fSegs, '#141414');

    // Ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(x, horse.targetY + 5, 44, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Lane indicators ────────────────────────────────────────────────────────

  function drawLaneIndicators() {
    obstacles.forEach(obs => {
      const dist = obs.x - hsx;
      if (dist > 200 && dist < 420) {
        const alpha = Math.max(0, 1 - (dist-200)/220);
        const ax = obs.x - 18;
        const groundY = obs.lane === 0 ? lowerAt(obs.x) : upperAt(obs.x);
        const ay = groundY - 55;
        ctx.save(); ctx.globalAlpha = alpha * 0.65;
        ctx.fillStyle = obs.lane === 0 ? '#ffcc44' : '#44ccff';
        ctx.beginPath();
        ctx.moveTo(ax, ay); ctx.lineTo(ax-10, ay-16); ctx.lineTo(ax-4, ay-16);
        ctx.lineTo(ax-4, ay-28); ctx.lineTo(ax+4, ay-28); ctx.lineTo(ax+4, ay-16);
        ctx.lineTo(ax+10, ay-16); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    });
  }

  // ── HUD ───────────────────────────────────────────────────────────────────

  function drawHUD() {
    // High score box (top right, wider to fit both scores)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(W-260, 12, 248, 38, 8); ctx.fill();
    // High score label + value
    ctx.fillStyle = '#aab8cc'; ctx.font = '13px Arial'; ctx.textAlign = 'right';
    ctx.fillText('High Score: ' + Math.floor(highScore), W-158, 36);
    // Divider
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(W-152, 18, 1, 26);
    // Current score
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'right';
    ctx.fillText('\uD83C\uDF4E ' + score, W-20, 38); ctx.textAlign = 'left';
    // Lane indicator (bottom left)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.roundRect(14, 12, 105, 38, 8); ctx.fill();
    ctx.fillStyle = horse.lane === 1 ? '#44ccff' : '#ffcc44';
    ctx.font = '15px Arial';
    ctx.fillText(horse.lane === 1 ? '\u2191 Upper path' : '\u2193 Lower path', 22, 36);
  }

  function drawProgressBar() {
    const progress = Math.min(1, worldOffset / LEVELS[level].finishAt);
    const barW = 200, barH = 8, barX = W/2 - barW/2, barY = 6;
    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
    // Fill
    ctx.fillStyle = progress < 0.8 ? '#44dd66' : '#ffdd44';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, barH, 4); ctx.fill();
    // Label
    ctx.fillStyle = '#fff'; ctx.font = '11px Arial'; ctx.textAlign = 'center';
    ctx.fillText(LEVELS[level].label + '  ' + Math.floor(progress * 100) + '%', W/2, 26);
    ctx.textAlign = 'left';
  }

  function drawFinishLine() {
    const finishWX = LEVELS[level].finishAt;
    const finishSX = finishWX - worldOffset;
    if (finishSX > W + 100 || finishSX < -60) return; // off screen

    // Draw checkered posts on both paths
    const paths = [lowerAt(finishSX), upperAt(finishSX)];
    for (const groundY of paths) {
      const postH = 80, postW = 10;
      const px = finishSX, py = groundY - postH;
      // Post
      ctx.fillStyle = '#fff';
      ctx.fillRect(px - postW/2, py, postW, postH);
      // Checkerboard pattern on post
      const sq = 10;
      for (let row = 0; row < postH / sq; row++) {
        for (let col = 0; col < 1; col++) {
          if ((row + col) % 2 === 0) {
            ctx.fillStyle = '#111';
            ctx.fillRect(px - postW/2, py + row * sq, postW, sq);
          }
        }
      }
    }
    // Banner between the posts
    const bannerY = Math.min(paths[0], paths[1]) - 80;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.roundRect(finishSX - 30, bannerY - 5, 60, 22, 4); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
    ctx.fillText('FINISH', finishSX, bannerY + 12);
    ctx.textAlign = 'left';
  }

  function drawOverlay(lines, colors) {
    const bh = lines.length * 38 + 22;
    ctx.fillStyle = 'rgba(0,0,10,0.62)';
    ctx.beginPath(); ctx.roundRect(W/2-230, 115, 460, bh, 14); ctx.fill();
    lines.forEach((t, i) => {
      ctx.fillStyle = colors[i] || '#fff';
      ctx.font = i === 0 ? 'bold 32px Arial' : '19px Arial';
      ctx.textAlign = 'center'; ctx.fillText(t, W/2, 153 + i*38);
    });
    ctx.textAlign = 'left';
  }

  // ── Collision ──────────────────────────────────────────────────────────────

  function checkCollision(obs) {
    const hp = horse.lane;
    if (obs.lane !== hp) return false;
    const gy = obs.lane === 0 ? lowerAt(obs.x) : upperAt(obs.x);
    const oy = gy - obs.h;
    const hx = hsx - 20, hy = horse.y - 100, hw = 60, hh = 100;
    return hx < obs.x + obs.w && hx + hw > obs.x && hy < oy + obs.h && hy + hh > oy;
  }

  function spawnObstacle() {
    const lane = Math.random() < 0.5 ? 0 : 1;
    const r = Math.random();
    let w, h, type;
    if (LEVELS[level].smallOnly) {
      // Level 1: only small obstacles
      if (r < 0.5) { w=44; h=40; type='boulder'; }
      else         { w=40; h=30; type='log'; }
    } else {
      // Level 2: all sizes
      if (r < 0.28)      { w=44; h=40; type='boulder'; }
      else if (r < 0.52) { w=62; h=56; type='boulder'; }
      else if (r < 0.76) { w=58; h=30; type='log'; }
      else               { w=40; h=50; type='log'; }
    }
    if (lane === 1) { w = Math.round(w*0.82); h = Math.round(h*0.82); }
    obstacles.push({ x: W+20, w, h, type, lane });
  }

  // ── Jump state machine ────────────────────────────────────────────────────

  function updateJumpPhase() {
    if (horse.jumpPhase === 'none') return;
    horse.jumpT += 0.06;
    switch (horse.jumpPhase) {
      case 'gather': if (horse.jumpT > 0.3) { horse.jumpPhase = 'launch'; horse.jumpT = 0; } break;
      case 'launch': if (horse.vy > -6) { horse.jumpPhase = 'tuck'; horse.jumpT = 0; } break;
      case 'tuck':   if (horse.vy > 2) { horse.jumpPhase = 'extend'; horse.jumpT = 0; } break;
      case 'extend': if (horse.vy > 6) { horse.jumpPhase = 'land'; horse.jumpT = 0; } break;
      case 'land':   if (horse.onGround) { horse.jumpPhase = 'none'; horse.jumpT = 0; } break;
    }
  }

  // ── Game Loop ─────────────────────────────────────────────────────────────

  function gameLoop() {
    if (state === 'playing') {
      frame++;
      // speed gradually increases as you collect more apples
      speed = LEVELS[level].speed + Math.floor(score / 15) * 0.5;
      worldOffset += speed;

      // Raven gallops FORWARD — her screen X actually increases!
      // Each gallop stride pushes her forward a bit
      const strideForward = Math.sin(horse.gallopT * Math.PI * 2);
      if (strideForward > 0.8) hsx += 0.6;  // push forward on each stride peak

      // Camera catch-up: when Raven gets too far right, camera pulls her back
      if (hsx > CAMERA_PULL_START) {
        // Camera "scrolls" to catch up — pull horse back toward center
        cameraSpeed = lerp(cameraSpeed, (hsx - CAMERA_PULL_START) * 0.08, 0.15);
        hsx -= cameraSpeed;
      } else {
        cameraSpeed *= 0.9; // ease off camera pull
      }

      // Keep her on screen
      hsx = Math.max(HORSE_MIN_SX, Math.min(HORSE_MAX_SX, hsx));

      // Gallop bounce on top of the running position
      hsx += Math.sin(horse.gallopT * Math.PI * 2) * 3;

      horse.gallopT = (horse.gallopT + 0.018 * speed) % 1;

      // Lane transition
      if (horse.onGround && Math.abs(horse.y - horse.targetY) > 1) {
        horse.y += (horse.targetY - horse.y) * 0.15;
      }

      // Gravity — hold space to jump higher, but cap at apple height
      const maxRise = 170; // max pixels above ground — right where apples are
      if (!horse.onGround) {
        const risen = horse.targetY - horse.y; // how high above ground
        if (spaceHeld && horse.vy < 0 && risen < maxRise) {
          horse.vy += GRAVITY * 0.55;  // lighter gravity while holding
        } else {
          horse.vy += GRAVITY;          // normal gravity (falling or capped)
        }
        horse.y += horse.vy;
        if (horse.y >= horse.targetY) {
          horse.y = horse.targetY;
          horse.vy = 0;
          horse.onGround = true;
        }
      }

      updateJumpPhase();

      // Spawn obstacles
      nextObsIn--;
      if (nextObsIn <= 0) {
        spawnObstacle();
        const baseObs = LEVELS[level].obsInterval;
        nextObsIn = Math.max(48, baseObs + Math.random() * 65 - Math.floor(score / 500) * 7);
      }

      // Spawn trees
      nextTreeIn--;
      if (nextTreeIn <= 0) {
        spawnTree();
        nextTreeIn = 50 + Math.random() * 120;
      }

      // Spawn apples
      nextAppleIn--;
      if (nextAppleIn <= 0) {
        spawnApples();
        nextAppleIn = LEVELS[level].appleInterval + Math.random() * 50;
      }

      // Move obstacles & trees & apples
      obstacles.forEach(o => o.x -= speed);
      obstacles = obstacles.filter(o => o.x + o.w > -20);
      trees.forEach(t => t.x -= speed);
      trees = trees.filter(t => t.x + t.size > -60);
      apples.forEach(a => { a.x -= speed; a.bob += 0.06; });
      apples = apples.filter(a => a.x > -20);

      // Collect apples
      checkAppleCollect();
      updateCollectFx();

      // Dust
      if (frame % 3 === 0) emitDust();
      updateDust();

      // Lava (level 4 only)
      if (level === 4) {
        nextLavaIn--;
        if (nextLavaIn <= 0) {
          spawnLava();
          nextLavaIn = 70 + Math.random() * 80;
        }
        lavaFlows.forEach(lv => lv.x -= speed);
        lavaFlows = lavaFlows.filter(lv => lv.x + lv.w > -20);
      }

      // Collision
      for (const obs of obstacles) {
        if (checkCollision(obs)) {
          state = 'dead'; stateTime = Date.now();
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('ravenHighScore', String(highScore));
          }
          break;
        }
      }

      // Lava collision (level 4)
      if (level === 4 && state === 'playing' && checkLavaCollision()) {
        state = 'dead'; stateTime = Date.now();
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('ravenHighScore', String(highScore));
        }
      }

      // Finish line check
      if (worldOffset >= LEVELS[level].finishAt) {
        state = 'won';
        spawnConfetti();
        // Victory jump!
        horse.vy = -11; horse.onGround = false;
        horse.jumpPhase = 'launch'; horse.jumpT = 0;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('ravenHighScore', String(highScore));
        }
      }
    }

    // Victory jump physics (let horse land after celebration jump)
    if (state === 'won' && !horse.onGround) {
      horse.vy += GRAVITY;
      horse.y += horse.vy;
      if (horse.y >= horse.targetY) {
        horse.y = horse.targetY;
        horse.vy = 0; horse.onGround = true;
        horse.jumpPhase = 'none';
      }
    }

    // ── Draw ──────────────────────────────────────────────────────────────
    drawSky();
    drawClouds();
    drawMountains();
    drawUpperLedge();
    drawLowerGround();
    drawTrees();
    drawLaneIndicators();

    // Draw obstacles on terrain
    obstacles.forEach(o => {
      const gy = o.lane === 0 ? lowerAt(o.x) : upperAt(o.x);
      if (o.type === 'boulder') drawBoulder(o.x, gy - o.h, o.w, o.h);
      else drawLog(o.x, gy - o.h, o.w, o.h);
    });

    drawApples();
    if (level === 4) drawLava();
    drawRaven(hsx, horse.y, horse.gallopT, horse.jumpPhase, horse.jumpT, state === 'playing');
    drawCollectFx();
    drawDust();
    drawFinishLine();
    updateConfetti();
    drawConfetti();
    drawHUD();
    if (state === 'playing') drawProgressBar();

    if (state === 'waiting') {
      drawOverlay(
        ['\uD83D\uDC0E  Wild Stallion \u2014 Raven', '1: Mountain  2: Sunset  3: Night  4: Volcano', 'SPACE = jump  |  \u2191 \u2193 = switch paths'],
        ['#ffe87a', '#88ffaa', '#aaccff']
      );
    }
    if (state === 'dead') {
      const isNew = score > highScore;
      drawOverlay(
        isNew
          ? ['\uD83C\uDFC6  New High Score!', '\uD83C\uDF4E Apples: ' + score, 'Press SPACE to continue']
          : ['Oh no! \uD83D\uDCA5', '\uD83C\uDF4E Apples: ' + score, 'Press SPACE to continue'],
        isNew
          ? ['#ffe87a', '#ffe87a', '#cccccc']
          : ['#ff6b6b', '#ffe87a', '#cccccc']
      );
    }
    if (state === 'won') {
      if (level < 4) {
        const nextTheme = LEVELS[level + 1].theme;
        drawOverlay(
          ['\uD83C\uDF89  ' + LEVELS[level].theme + ' Complete!', '\uD83C\uDF4E Apples: ' + score, 'Press SPACE for ' + nextTheme + '!'],
          ['#88ffaa', '#ffe87a', '#cccccc']
        );
      } else {
        drawOverlay(
          ['\uD83C\uDFC6  You Beat All 4 Levels!', '\uD83C\uDF4E Total Apples: ' + score, 'Amazing job! Press SPACE to play again'],
          ['#ffe87a', '#88ffaa', '#cccccc']
        );
      }
    }

    requestAnimationFrame(gameLoop);
  }

  gameLoop();
  </script>
</body>
</html>
