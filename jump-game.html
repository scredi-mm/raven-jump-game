  <script>
    const _isMobileHint = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    document.getElementById('hint').innerHTML = _isMobileHint
      ? 'TAP = jump &nbsp;|&nbsp; SWIPE ↑↓ = switch path &nbsp;|&nbsp; DOUBLE-TAP = rear'

  <script>
  // --- Feedback system ---
  (function() {
    const fbBtn = document.getElementById('fb-btn');
    const fbOverlay = document.getElementById('fb-overlay');
    const fbClose = document.getElementById('fb-close');
    const fbText = document.getElementById('fb-text');
    const fbSend = document.getElementById('fb-send');
    const fbFormWrap = document.getElementById('fb-form-wrap');
    const fbThanks = document.getElementById('fb-thanks');

    function openFeedback() {
      fbOverlay.classList.add('open');
      fbFormWrap.style.display = 'block';
      fbThanks.style.display = 'none';
      fbText.value = '';
      fbText.focus();
    }
    function closeFeedback() {
      fbOverlay.classList.remove('open');
    }
    fbBtn.addEventListener('click', openFeedback);
    fbBtn.addEventListener('touchend', function(e) { e.preventDefault(); openFeedback(); });
    fbClose.addEventListener('click', closeFeedback);
    fbSend.addEventListener('click', function() {
      const msg = fbText.value.trim();
      if (!msg) return;
      // Submit to Google Form via hidden iframe
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = 'https://docs.google.com/forms/d/e/1FAIpQLSeIjBXax0kYbEvmJ1NPopzR1yEKz3s5fC3L2nCm3QNZ2hlmFw/formResponse';
      form.target = 'fb-iframe';
      form.style.display = 'none';
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'entry.1111495181';
      input.value = msg;
      form.appendChild(input);
      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);
      // Show thanks
      fbFormWrap.style.display = 'none';
      fbThanks.style.display = 'block';
      setTimeout(closeFeedback, 1500);
    });
    // Close on overlay background click
    fbOverlay.addEventListener('click', function(e) {
      if (e.target === fbOverlay) closeFeedback();
    });
    // Prevent touch events on overlay from reaching the game
    fbOverlay.addEventListener('touchstart', function(e) { e.stopPropagation(); });
    fbOverlay.addEventListener('touchmove', function(e) { e.stopPropagation(); });
    fbOverlay.addEventListener('touchend', function(e) { e.stopPropagation(); });
  })();
  </script>
  <script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 380;

  // Polyfill for roundRect (not supported in older browsers)
  if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = [r, r, r, r];
      if (!Array.isArray(r)) r = [0, 0, 0, 0];
      const [tl, tr, br, bl] = r;
      this.moveTo(x + tl, y);
      this.lineTo(x + w - tr, y);
      this.quadraticCurveTo(x + w, y, x + w, y + tr);
      this.lineTo(x + w, y + h - br);
      this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
      this.lineTo(x + bl, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - bl);
      this.lineTo(x, y + tl);
      this.quadraticCurveTo(x, y, x + tl, y);
      this.closePath();
      return this;
    };
  }

  function terrainShape(wx) {

    // Small bumpy trail texture — rocky mountain path feel
    const bumps = Math.sin(wx * 0.006) * 6
                + Math.sin(wx * 0.012) * 3;
    return bigHill + medHills + bumps;
  }

      ctx.moveTo(eifX-3, 60); ctx.lineTo(eifX, 15); ctx.lineTo(eifX+3, 60); ctx.closePath(); ctx.fill();
      // Platform
      ctx.fillRect(eifX-14, 130, 28, 4);
      return;
    }

    if (theme === 'michigan') {
      // Michigan autumn forest with Great Lakes
      const far = [[0,190],[60,150],[140,175],[240,130],[340,165],[450,140],[560,170],[670,135],[780,160],[800,155],[800,H],[0,H]];
      ctx.fillStyle = lv.mountains[0];
      drawPoly(far, -mOff*0.3); drawPoly(far, W-mOff*0.3);
      const mid = [[0,220],[80,195],[180,215],[300,185],[420,210],[540,190],[660,205],[780,195],[800,210],[800,H],[0,H]];
      ctx.fillStyle = lv.mountains[1];
      drawPoly(mid, -mOff*0.5); drawPoly(mid, W-mOff*0.5);
      // Lake Michigan shimmer in background
      ctx.fillStyle = '#2266aa';
      ctx.fillRect(0, 218, W, 18);
      const wt = frame * 0.03;
      ctx.strokeStyle = 'rgba(100,180,255,0.3)'; ctx.lineWidth = 1;
      for (let r = 0; r < 3; r++) {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 5) {
          ctx.lineTo(x, 222 + r*5 + Math.sin(x*0.02+wt+r)*2);
        }
        ctx.stroke();
      }
      // Lighthouse in distance
      const lhX = ((550 - mOff*0.2) % W + W) % W;
      ctx.fillStyle = '#ffffff'; ctx.fillRect(lhX-3, 170, 6, 30);
      ctx.fillStyle = '#cc3333'; ctx.fillRect(lhX-4, 170, 8, 5);
      ctx.fillStyle = '#ffee88';
      ctx.beginPath(); ctx.arc(lhX, 168, 4, 0, Math.PI*2); ctx.fill();
      // Falling autumn leaves
      const leafColors = ['#cc4422','#dd6622','#eeaa22','#cc3300','#dd8800'];
      for (let i = 0; i < 10; i++) {
        const lx = ((i*83 + frame*0.7) % W);
        const ly = ((i*51 + frame*0.5) % 180) + 30;
        ctx.fillStyle = leafColors[i % leafColors.length];
        ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.ellipse(lx, ly, 4, 2.5, frame*0.03+i*0.5, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      return;
    }

    if (theme === 'texas') {
      // Texas desert with mesas and big sky
      const mesas = [[0,210],[50,210],[55,160],[120,160],[125,210],[250,210],[255,140],[350,140],[355,210],
        [500,210],[505,170],[580,170],[585,210],[700,210],[705,150],[790,150],[800,210],[800,H],[0,H]];
      ctx.fillStyle = lv.mountains[0];
      drawPoly(mesas, -mOff*0.25); drawPoly(mesas, W-mOff*0.25);
      // Closer mesa layer
      const near = [[0,235],[100,235],[105,195],[170,195],[175,235],[350,235],[355,200],[430,200],[435,235],
        [600,235],[605,210],[680,210],[685,235],[800,235],[800,H],[0,H]];
      ctx.fillStyle = lv.mountains[1];
      drawPoly(near, -mOff*0.5); drawPoly(near, W-mOff*0.5);
      // Big sun
      const sunX = ((650 - mOff*0.05) % W + W) % W;
      ctx.globalAlpha = 0.5;
      const sunGrd = ctx.createRadialGradient(sunX, 120, 20, sunX, 120, 70);
      sunGrd.addColorStop(0, '#ffee44'); sunGrd.addColorStop(0.5, '#ff9900'); sunGrd.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = sunGrd;
      ctx.beginPath(); ctx.arc(sunX, 120, 70, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      // Distant cactus silhouettes
      ctx.fillStyle = '#7a5a28';
      [[180,208],[420,205],[680,210]].forEach(([cx,cy]) => {
        const sx = ((cx - mOff*0.35) % W + W) % W;
        ctx.fillRect(sx-2, cy-20, 4, 20);
        ctx.fillRect(sx-8, cy-15, 6, 3); ctx.fillRect(sx-8, cy-15, 3, -8);
        ctx.fillRect(sx+3, cy-12, 6, 3); ctx.fillRect(sx+6, cy-12, 3, -6);
      });
      // Heat shimmer
      ctx.globalAlpha = 0.04;
      ctx.fillStyle = '#ffffff';
      for (let x = 0; x < W; x += 20) {
        const sy = 240 + Math.sin(x*0.05+frame*0.06)*3;
        ctx.fillRect(x, sy, 15, 2);
      }
      ctx.globalAlpha = 1;
      // Lava hazard visual (oil fires / brush fires)
      if (LEVELS[level].hazard === 'lava' || LEVELS[level].hazard === 'both') {
        const t = frame * 0.03;
        ctx.strokeStyle = `rgba(255,${80+Math.sin(t)*40},0,0.3)`;
        ctx.lineWidth = 2;
        [[200,160],[350,140]].forEach(([px,py]) => {
          const sx = ((px - mOff*0.25) % W + W) % W;
          ctx.beginPath(); ctx.moveTo(sx, py);
          ctx.quadraticCurveTo(sx+5, py-20, sx+3, py-35); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx+8, py+2);
          ctx.quadraticCurveTo(sx+12, py-15, sx+10, py-28); ctx.stroke();
        });
      }
      return;
    }

    if (theme === 'arctic') {
      // Dark stormy arctic with ice formations
      const ice1 = [[0,180],[50,150],[90,170],[150,120],[200,160],[270,100],[330,155],[400,130],[470,165],[540,110],[610,150],[680,135],[750,160],[800,145],[800,H],[0,H]];
      ctx.fillStyle = lv.mountains[0];
      drawPoly(ice1, -mOff*0.25); drawPoly(ice1, W-mOff*0.25);
      // Ice/glacier highlights
      ctx.fillStyle = 'rgba(150,200,230,0.3)';
      [[150,120],[270,100],[540,110]].forEach(([px,py]) => {
        const sx = ((px - mOff*0.25) % W + W) % W;
        ctx.beginPath(); ctx.moveTo(sx-15, py+30); ctx.lineTo(sx, py); ctx.lineTo(sx+15, py+30); ctx.closePath(); ctx.fill();
      });
      const ice2 = [[0,220],[70,195],[160,215],[270,180],[370,210],[470,190],[570,205],[670,185],[770,200],[800,210],[800,H],[0,H]];
      ctx.fillStyle = lv.mountains[1];
      drawPoly(ice2, -mOff*0.5); drawPoly(ice2, W-mOff*0.5);
      // Blowing snow particles
      ctx.fillStyle = 'rgba(220,235,245,0.6)';
      for (let i = 0; i < 20; i++) {
        const sx = ((i*43 + frame*2.5) % (W+40)) - 20;
        const sy = 80 + (i*37)%180 + Math.sin(frame*0.08+i*2)*15;
        ctx.beginPath(); ctx.arc(sx, sy, 1.5+Math.random(), 0, Math.PI*2); ctx.fill();
      }
      // Lightning flash (rare)
      if (Math.sin(frame*0.007) > 0.98) {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#aaccff';
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
      }
      return;
    }

    if (theme === 'beach') {
      // Sand dunes instead of mountains
      const dunes = [[0,220],[60,195],[150,210],[250,185],[350,200],[450,180],[550,195],[650,188],[750,205],[800,210],[800,H],[0,H]];
      ctx.fillStyle = '#d4aa55';
      drawPoly(dunes, -mOff*0.3); drawPoly(dunes, W-mOff*0.3);
      const near = [[0,240],[70,225],[180,235],[300,218],[420,230],[540,215],[660,228],[780,222],[800,235],[800,H],[0,H]];
      ctx.fillStyle = '#c49a45';
      drawPoly(near, -mOff*0.6); drawPoly(near, W-mOff*0.6);
      // Ocean waves behind the trail
      const waveT = frame * 0.04;
      ctx.fillStyle = '#1a6aaa';
      ctx.beginPath(); ctx.moveTo(0, 280);
      for (let x = 0; x <= W; x += 4) {
        ctx.lineTo(x, 275 + Math.sin(x*0.03+waveT)*5 + Math.sin(x*0.01+waveT*0.7)*3);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
      // Foam on wave crests
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, 278);
      for (let x = 0; x <= W; x += 4) {
        ctx.lineTo(x, 274 + Math.sin(x*0.03+waveT)*5 + Math.sin(x*0.01+waveT*0.7)*3);
      }
      ctx.stroke();
      // Seagulls
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
      [[100,80],[350,60],[600,90],[750,55]].forEach(([gx,gy], i) => {
        const sx = ((gx + frame*0.3 + i*50) % (W+60)) - 30;
        ctx.beginPath();
        ctx.moveTo(sx-8, gy+3); ctx.quadraticCurveTo(sx-4, gy-3, sx, gy);
        ctx.quadraticCurveTo(sx+4, gy-3, sx+8, gy+3);
        ctx.stroke();
      });
      return;
    }

    if (theme === 'city') {
      // NYC skyline with buildings
      const buildings = [
        [0,180,40],[45,140,35],[85,165,45],[135,110,40],[180,150,35],[220,130,50],
        [275,170,40],[320,100,45],[370,145,35],[410,120,40],[455,160,45],[505,90,50],
        [560,140,35],[600,115,45],[650,155,40],[695,105,35],[735,135,45],[785,125,30],
      ];
      ctx.fillStyle = lv.mountains[0];
      buildings.forEach(([bx,by,bw]) => {
        const sx = ((bx - mOff*0.3) % W + W) % W;
        ctx.fillRect(sx, by, bw, H-by);
      });
      ctx.fillStyle = 'rgba(255,220,80,0.4)';
      buildings.forEach(([bx,by,bw]) => {
        const sx = ((bx - mOff*0.3) % W + W) % W;
        for (let wy = by+8; wy < Math.min(by+100, H-30); wy += 14) {
          for (let wx = 4; wx < bw-6; wx += 10) { ctx.fillRect(sx+wx, wy, 5, 7); }
        }
      });
      // Empire State Building silhouette
      const esX = ((505 - mOff*0.3) % W + W) % W;
      ctx.fillStyle = lv.mountains[0];
      ctx.fillRect(esX+15, 40, 18, 50); // spire section
      ctx.fillRect(esX+20, 20, 8, 25); // antenna
      ctx.fillRect(esX+22, 10, 4, 12); // tip
      const near = [
        [0,200,50],[55,175,40],[100,195,55],[160,160,45],[210,185,40],[255,170,50],
        [310,200,45],[360,155,40],[405,180,50],[460,165,45],[510,190,40],[555,150,55],
        [615,175,40],[660,195,50],[715,165,45],[765,185,40],
      ];
      ctx.fillStyle = lv.mountains[1];
      near.forEach(([bx,by,bw]) => {
        const sx = ((bx - mOff*0.6) % W + W) % W;
        ctx.fillRect(sx, by, bw, H-by);
      });
      ctx.fillStyle = 'rgba(255,220,80,0.6)';
      near.forEach(([bx,by,bw]) => {
        const sx = ((bx - mOff*0.6) % W + W) % W;
        for (let wy = by+8; wy < Math.min(by+80, H-30); wy += 14) {
          for (let wx = 5; wx < bw-6; wx += 10) { ctx.fillRect(sx+wx, wy, 5, 7); }
        }
      });
      return;
    }
  }

  function drawPoly(pts, ox) {
    ctx.save(); ctx.translate(ox, 0); ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  // ── Terrain drawing ────────────────────────────────────────────────────────

  function drawUpperLedge() {
    // Cliff face fill (from upper path down ~45px)
    ctx.fillStyle = LEVELS[level].ledge;
    ctx.beginPath();
    ctx.moveTo(0, upperAt(0));
    for (let sx = 0; sx <= W; sx += 8) ctx.lineTo(sx, upperAt(sx));
    for (let sx = W; sx >= 0; sx -= 8) ctx.lineTo(sx, upperAt(sx) + 45);
    ctx.closePath();
    ctx.fill();

    // Ledge face gradient
    const grd = ctx.createLinearGradient(0, 0, 0, 45);
    grd.addColorStop(0, 'rgba(100,85,65,0.9)');
    grd.addColorStop(0.4, 'rgba(65,48,30,0.9)');
    grd.addColorStop(1, 'rgba(35,20,5,0.7)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(0, upperAt(0) + 2);
    for (let sx = 0; sx <= W; sx += 8) ctx.lineTo(sx, upperAt(sx) + 2);
    for (let sx = W; sx >= 0; sx -= 8) ctx.lineTo(sx, upperAt(sx) + 45);
    ctx.closePath();
    ctx.fill();

    // Surface trail line
    ctx.strokeStyle = LEVELS[level].trail;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, upperAt(0));
    for (let sx = 0; sx <= W; sx += 6) ctx.lineTo(sx, upperAt(sx));
    ctx.stroke();

    // Pebbles
    ctx.fillStyle = LEVELS[level].pebble;
    for (let i = 0; i < 10; i++) {
      const px = ((i * 85 + frame * speed * 0.25) % (W + 20)) - 10;
      ctx.beginPath();
      ctx.ellipse(px, upperAt(px) + 4, 3, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawLowerGround() {
    // Fill from lower terrain to bottom of canvas
    const lv = LEVELS[level];
    const grd = ctx.createLinearGradient(0, LOWER_Y - 20, 0, H);
    grd.addColorStop(0, lv.ground[0]);
    grd.addColorStop(0.15, lv.ground[1]);
    grd.addColorStop(1, lv.ground[2]);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(0, lowerAt(0));
    for (let sx = 0; sx <= W; sx += 8) ctx.lineTo(sx, lowerAt(sx));
    ctx.lineTo(W, H); ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // Trail surface line
    ctx.strokeStyle = LEVELS[level].trail;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, lowerAt(0));
    for (let sx = 0; sx <= W; sx += 6) ctx.lineTo(sx, lowerAt(sx));
    ctx.stroke();

    // Pebbles
    ctx.fillStyle = lv.pebble;
    for (let i = 0; i < 14; i++) {
      const px = ((i * 62 + frame * speed * 0.28) % (W + 20)) - 10;
      const py = lowerAt(px) + 6 + (i % 4) * 4;
      ctx.beginPath();
      ctx.ellipse(px, py, 4 + (i % 2), 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Trees ──────────────────────────────────────────────────────────────────

  function spawnTree() {
    const theme = LEVELS[level].obstacleTheme;
    let type;
    if (theme === 'paris') type = 'lamppost';
    else if (theme === 'canada') type = 'snow_pine';
    else if (theme === 'kentucky') type = Math.random() < 0.4 ? 'oak' : 'fence_section';
    else if (theme === 'michigan') type = Math.random() < 0.5 ? 'autumn_tree' : 'pine';
    else if (theme === 'texas') type = Math.random() < 0.6 ? 'cactus_tree' : 'tumbleweed_tree';
    else if (theme === 'arctic') type = 'ice_tree';
    else if (theme === 'beach') type = 'palm';
    else if (theme === 'city') type = 'streetlight';
    else type = Math.random() < 0.55 ? 'pine' : 'oak';
    trees.push({
      x: W + 40 + Math.random() * 80,
      type,
      size: 90 + Math.random() * 70,
      lane: Math.random() < 0.7 ? 0 : 1,
    });
  }

  function drawPineTree(sx, sy, size) {
    ctx.fillStyle = '#4a2a15';
    const tw = size * 0.07;
    ctx.fillRect(sx - tw, sy - size * 0.18, tw * 2, size * 0.18);
    for (let i = 0; i < 3; i++) {
      const ly = sy - size * 0.18 - i * size * 0.22;
      const lw = size * (0.36 - i * 0.08);
      const lh = size * 0.28;
      ctx.fillStyle = ['#15401a', '#1a4c1f', '#1f5825'][i];
      ctx.beginPath(); ctx.moveTo(sx, ly - lh); ctx.lineTo(sx - lw, ly); ctx.lineTo(sx + lw, ly); ctx.closePath(); ctx.fill();
      ctx.fillStyle = ['#1e5522', '#26652a', '#2e7832'][i];
      ctx.beginPath(); ctx.moveTo(sx - 2, ly - lh + 4); ctx.lineTo(sx - lw * 0.6, ly - 2); ctx.lineTo(sx + 2, ly - lh + 4); ctx.closePath(); ctx.fill();
    }
  }

  function drawOakTree(sx, sy, size) {
    ctx.fillStyle = '#5a3a20';
    const tw = size * 0.06;
    ctx.fillRect(sx - tw, sy - size * 0.22, tw * 2, size * 0.22);
    ctx.strokeStyle = '#4a2a15'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx - tw, sy - size * 0.15); ctx.lineTo(sx - size * 0.12, sy - size * 0.28);
    ctx.moveTo(sx + tw, sy - size * 0.14); ctx.lineTo(sx + size * 0.15, sy - size * 0.26);
    ctx.stroke();
    const cy = sy - size * 0.38;
    const puffs = [[0,0,size*0.2],[-size*0.14,0.04*size,size*0.17],[size*0.14,0.04*size,size*0.17],[0,-size*0.11,size*0.17],[-size*0.08,-size*0.07,size*0.14],[size*0.1,-size*0.05,size*0.15]];
    ctx.fillStyle = '#1e5518'; puffs.forEach(([dx,dy,r]) => { ctx.beginPath(); ctx.arc(sx+dx, cy+dy+3, r, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#2a6a22'; puffs.forEach(([dx,dy,r]) => { ctx.beginPath(); ctx.arc(sx+dx, cy+dy, r, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#3a8a30'; puffs.slice(0,3).forEach(([dx,dy,r]) => { ctx.beginPath(); ctx.arc(sx+dx-2, cy+dy-3, r*0.55, 0, Math.PI*2); ctx.fill(); });
  }

  function drawSnowPine(sx, sy, size) {
    ctx.fillStyle = '#3a2515'; const tw = size * 0.07;
    ctx.fillRect(sx - tw, sy - size * 0.18, tw * 2, size * 0.18);
    for (let i = 0; i < 3; i++) {
      const ly = sy - size * 0.18 - i * size * 0.22;
      const lw = size * (0.34 - i * 0.08);
      const lh = size * 0.26;
      ctx.fillStyle = ['#1a3a20','#1e4425','#22502a'][i];
      ctx.beginPath(); ctx.moveTo(sx, ly-lh); ctx.lineTo(sx-lw, ly); ctx.lineTo(sx+lw, ly); ctx.closePath(); ctx.fill();
      // Snow on branches
      ctx.fillStyle = 'rgba(230,240,250,0.7)';
      ctx.beginPath(); ctx.moveTo(sx, ly-lh+3); ctx.lineTo(sx-lw*0.8, ly-2); ctx.lineTo(sx+lw*0.8, ly-2);
      ctx.closePath(); ctx.fill();
    }
  }

  function drawLamppost(sx, sy, size) {
    const h = size * 0.6;
    ctx.fillStyle = '#2a2a2a'; ctx.fillRect(sx-2, sy-h, 4, h);
    // Ornate top
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath(); ctx.arc(sx, sy-h-2, 5, 0, Math.PI*2); ctx.fill();
    // Light glow
    ctx.globalAlpha = 0.3;
    const glow = ctx.createRadialGradient(sx, sy-h-2, 2, sx, sy-h-2, 20);
    glow.addColorStop(0, '#ffdd88'); glow.addColorStop(1, 'rgba(255,220,130,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(sx, sy-h-2, 20, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Lamp glass
    ctx.fillStyle = '#ffee99';
    ctx.beginPath(); ctx.arc(sx, sy-h-2, 3, 0, Math.PI*2); ctx.fill();
  }

  function drawIceTree(sx, sy, size) {
    // Frozen dead tree
    ctx.strokeStyle = '#5a7080'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy-size*0.4); ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy-size*0.25); ctx.lineTo(sx-size*0.15, sy-size*0.4);
    ctx.moveTo(sx, sy-size*0.3); ctx.lineTo(sx+size*0.12, sy-size*0.42);
    ctx.moveTo(sx, sy-size*0.35); ctx.lineTo(sx-size*0.08, sy-size*0.48);
    ctx.stroke();
    // Ice crystals
    ctx.fillStyle = 'rgba(180,220,240,0.5)';
    ctx.beginPath(); ctx.arc(sx-size*0.12, sy-size*0.38, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+size*0.1, sy-size*0.4, 4, 0, Math.PI*2); ctx.fill();
  }

  function drawPalmTree(sx, sy, size) {
    // Curved trunk
    ctx.strokeStyle = '#8a6a30'; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(sx+size*0.08, sy-size*0.3, sx+size*0.04, sy-size*0.55);
    ctx.stroke();
    // Trunk texture lines
    ctx.strokeStyle = '#7a5a25'; ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const t = i/6; const ty = sy - size*0.55*t;
      const tx = sx + size*0.08*t*(1-t)*4*0.5;
      ctx.beginPath(); ctx.moveTo(tx-4, ty); ctx.lineTo(tx+4, ty); ctx.stroke();
    }
    // Palm fronds
    const topX = sx + size*0.04, topY = sy - size*0.55;
    const fronds = [[-0.6,-0.15],[0.5,-0.1],[-0.3,-0.3],[0.4,-0.25],[-0.1,-0.35],[0.2,-0.32],[-0.5,0.05],[0.6,0.08]];
    fronds.forEach(([dx,dy]) => {
      ctx.strokeStyle = '#2a7a22'; ctx.lineWidth = 2;
      const fx = topX+dx*size*0.5, fy = topY+dy*size*0.5+size*0.15;
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.quadraticCurveTo(topX+dx*size*0.25, topY+dy*size*0.15-size*0.05, fx, fy);
      ctx.stroke();
      // Leaf segments
      ctx.fillStyle = '#2a8a28';
      for (let s = 0.3; s < 0.9; s += 0.15) {
        const lx = topX+(fx-topX)*s, ly = topY+(fy-topY)*s-size*0.02*(1-s);
        ctx.beginPath(); ctx.ellipse(lx, ly, 6, 2, Math.atan2(dy,dx), 0, Math.PI*2); ctx.fill();
      }
    });
    // Coconuts
    ctx.fillStyle = '#5a3a15';
    ctx.beginPath(); ctx.arc(topX-3, topY+4, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(topX+4, topY+5, 3, 0, Math.PI*2); ctx.fill();
  }

  function drawStreetlight(sx, sy, size) {
    const h = size * 0.65;
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(sx-2, sy-h, 4, h);
    // Curved arm
    ctx.strokeStyle = '#4a4a4a'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(sx, sy-h); ctx.quadraticCurveTo(sx+12, sy-h-5, sx+18, sy-h+8);
    ctx.stroke();
    // Light fixture
    ctx.fillStyle = '#555'; ctx.fillRect(sx+14, sy-h+8, 8, 4);
    // Light cone
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#ffee88';
    ctx.beginPath(); ctx.moveTo(sx+14, sy-h+12); ctx.lineTo(sx+6, sy); ctx.lineTo(sx+26, sy); ctx.lineTo(sx+22, sy-h+12); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
    // Lamp
    ctx.fillStyle = '#ffdd66';
    ctx.beginPath(); ctx.arc(sx+18, sy-h+10, 2, 0, Math.PI*2); ctx.fill();
  }

  function drawFenceSection(sx, sy, size) {
    ctx.fillStyle = '#ffffff';
    const fh = size * 0.2;
    ctx.fillRect(sx-2, sy-fh, 4, fh); ctx.fillRect(sx+25, sy-fh, 4, fh);
    ctx.fillRect(sx-2, sy-fh*0.85, 29, 3); ctx.fillRect(sx-2, sy-fh*0.45, 29, 3);
  }

  function drawAutumnTree(sx, sy, size) {
    ctx.fillStyle = '#5a3a1a';
    const tw = size * 0.06;
    ctx.fillRect(sx-tw, sy-size*0.22, tw*2, size*0.22);
    const cy = sy - size*0.38;
    const colors = ['#cc3300','#dd5522','#ee8822','#dd4411','#cc6600'];
    const puffs = [[0,0,size*0.2],[-size*0.14,0.04*size,size*0.16],[size*0.13,0.03*size,size*0.17],[0,-size*0.1,size*0.15],[-size*0.08,-size*0.06,size*0.13],[size*0.09,-size*0.04,size*0.14]];
    puffs.forEach(([dx,dy,r], i) => {
      ctx.fillStyle = colors[i % colors.length];
      ctx.beginPath(); ctx.arc(sx+dx, cy+dy, r, 0, Math.PI*2); ctx.fill();
    });
    ctx.fillStyle = '#ee9933';
    puffs.slice(0,3).forEach(([dx,dy,r]) => { ctx.beginPath(); ctx.arc(sx+dx-2, cy+dy-3, r*0.4, 0, Math.PI*2); ctx.fill(); });
  }

  function drawCactusTree(sx, sy, size) {
    const h = size * 0.45;
    ctx.fillStyle = '#3a7a30';
    // Main stem
    ctx.beginPath();
    ctx.moveTo(sx-5, sy); ctx.lineTo(sx-4, sy-h); ctx.lineTo(sx+4, sy-h); ctx.lineTo(sx+5, sy);
    ctx.closePath(); ctx.fill();
    // Left arm
    ctx.beginPath();
    ctx.moveTo(sx-5, sy-h*0.5); ctx.lineTo(sx-14, sy-h*0.5); ctx.lineTo(sx-14, sy-h*0.8); ctx.lineTo(sx-10, sy-h*0.8); ctx.lineTo(sx-10, sy-h*0.45); ctx.lineTo(sx-5, sy-h*0.45);
    ctx.closePath(); ctx.fill();
    // Right arm
    ctx.beginPath();
    ctx.moveTo(sx+5, sy-h*0.6); ctx.lineTo(sx+12, sy-h*0.6); ctx.lineTo(sx+12, sy-h*0.9); ctx.lineTo(sx+8, sy-h*0.9); ctx.lineTo(sx+8, sy-h*0.55); ctx.lineTo(sx+5, sy-h*0.55);
    ctx.closePath(); ctx.fill();
    // Highlights
    ctx.fillStyle = '#4a9a40';
    ctx.fillRect(sx-2, sy-h+3, 2, h-6);
  }

  function drawTumbleweedTree(sx, sy, size) {
    // A static tumbleweed (decoration, not obstacle)
    const r = size * 0.1;
    ctx.strokeStyle = '#8a7a50'; ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5;
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      ctx.beginPath();
      ctx.arc(sx + Math.cos(a)*r*0.5, sy-r + Math.sin(a)*r*0.5, r*0.4, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#9a8a60';
    ctx.beginPath(); ctx.arc(sx, sy-r, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a7a50';
    ctx.beginPath(); ctx.arc(sx, sy-r, r*0.7, 0, Math.PI*2); ctx.fill();
  }

  function drawTrees() {
    trees.forEach(t => {
      const groundY = t.lane === 0 ? lowerAt(t.x) : upperAt(t.x);
      switch(t.type) {
        case 'pine': drawPineTree(t.x, groundY, t.size); break;
        case 'oak': drawOakTree(t.x, groundY, t.size); break;
        case 'snow_pine': drawSnowPine(t.x, groundY, t.size); break;
        case 'lamppost': drawLamppost(t.x, groundY, t.size); break;
        case 'ice_tree': drawIceTree(t.x, groundY, t.size); break;
        case 'palm': drawPalmTree(t.x, groundY, t.size); break;
        case 'streetlight': drawStreetlight(t.x, groundY, t.size); break;
        case 'fence_section': drawFenceSection(t.x, groundY, t.size); break;
        case 'autumn_tree': drawAutumnTree(t.x, groundY, t.size); break;
        case 'cactus_tree': drawCactusTree(t.x, groundY, t.size); break;
        case 'tumbleweed_tree': drawTumbleweedTree(t.x, groundY, t.size); break;
        default: drawPineTree(t.x, groundY, t.size);
      }
    });
  }

  // ── Dust particles ─────────────────────────────────────────────────────────

  function emitDust() {
    if (!horse.onGround) return;
    const th = LEVELS[level].obstacleTheme;
    const isSnowy = th === 'canada' || th === 'arctic';
    const isSandy = th === 'beach';
    const isSoft = isSnowy || isSandy;
    const count = isSoft ? 3 : 2;
    for (let i = 0; i < count; i++) {
      dust.push({
        x: hsx - 42 + Math.random() * 10,
        y: horse.y - 2 + Math.random() * 4 + snowSink,
        vx: -1.5 - Math.random() * 2.5,
        vy: isSoft ? -Math.random() * 2.5 : -Math.random() * 1.8,
        life: 1,
        size: isSoft ? 2.5 + Math.random() * 4 : 2 + Math.random() * 3.5,
        snow: isSnowy,
        sand: isSandy,
      });
    }
  }

  function updateDust() {
    dust.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += p.snow ? 0.06 : 0.04;
      p.life -= p.snow ? 0.02 : 0.025;
      p.size *= p.snow ? 0.99 : 0.985;
    });
    dust = dust.filter(p => p.life > 0);
    // Snow burst particles
    snowBursts.forEach(p => { p.size *= 0.97; });
    snowBursts = snowBursts.filter(p => p.life > 0);
  }

  function drawDust() {
    dust.forEach(p => {
      if (p.snow) {
        ctx.fillStyle = `rgba(220,235,250,${p.life * 0.7})`;
      } else if (p.sand) {
        ctx.fillStyle = `rgba(210,190,140,${p.life * 0.6})`;
      } else {
        ctx.fillStyle = `rgba(160,140,100,${p.life * 0.5})`;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    // Snow burst particles (from landing)
    snowBursts.forEach(p => {
      ctx.fillStyle = `rgba(230,240,255,${p.life * 0.8})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // ── Apples ───────────────────────────────────────────────────────────────

  let appleLane = 0;         // which lane apples are currently spawning on
  let appleGroupsOnLane = 0; // how many groups have spawned on this lane
  const GROUPS_BEFORE_SWITCH = 3; // spawn 3 groups then switch lanes

  function spawnApples() {
    // After a few groups on one lane, switch to the other lane
    appleGroupsOnLane++;
    if (appleGroupsOnLane > GROUPS_BEFORE_SWITCH) {
      appleLane = appleLane === 0 ? 1 : 0;
      appleGroupsOnLane = 1;
    }

    const floatH = 28 + Math.random() * 10;  // apples at lower height to match halved jump

    // Spawn a cluster of 1-4 apples in a line
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      apples.push({
        x: W + 30 + i * 32,
        lane: appleLane,
        floatH: floatH,
        bob: Math.random() * Math.PI * 2, // bobbing phase offset
        size: 7 + Math.random() * 2.5,
        shape: Math.floor(Math.random() * 5),  // 0-4: different apple shapes
        hue: Math.random(),  // color variation
      });
    }
  }

  function drawApple(ax, ay, size, bob, shape, hue) {
    shape = shape || 0;
    hue = hue || 0;
    const by = Math.sin(bob) * 2; // gentle floating bob
    const cy = ay + by;
    const s = size;

    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.ellipse(ax, ay + s + 3 - by, s * 0.5, 2, 0, 0, Math.PI*2); ctx.fill();

    // Pick color variation based on hue
    let baseR, darkR, lightR;
    if (hue < 0.25) {
      // Deep red
      baseR = '#b81220'; darkR = '#8a0c16'; lightR = '#d4263a';
    } else if (hue < 0.5) {
      // Bright red
      baseR = '#cc1a1a'; darkR = '#991212'; lightR = '#e63838';
    } else if (hue < 0.75) {
      // Red-green (like a mixed apple)
      baseR = '#c42828'; darkR = '#7a8822'; lightR = '#dd4040';
    } else {
      // Dark crimson
      baseR = '#a01525'; darkR = '#6e0e18'; lightR = '#c82a3a';
    }

    ctx.save();
    ctx.translate(ax, cy);

    // Draw apple silhouette — each shape is different
    ctx.beginPath();
    if (shape === 0) {
      // Classic apple — slightly wider at bottom, indent at top
      ctx.moveTo(0, -s * 0.9);
      ctx.bezierCurveTo(-s*0.3, -s*1.05, -s*0.95, -s*0.6, -s*0.85, -s*0.1);
      ctx.bezierCurveTo(-s*0.8, s*0.4, -s*0.5, s*0.85, 0, s*0.9);
      ctx.bezierCurveTo(s*0.5, s*0.85, s*0.8, s*0.4, s*0.85, -s*0.1);
      ctx.bezierCurveTo(s*0.95, -s*0.6, s*0.3, -s*1.05, 0, -s*0.9);
    } else if (shape === 1) {
      // Tall/elongated apple
      ctx.moveTo(0, -s * 0.95);
      ctx.bezierCurveTo(-s*0.25, -s*1.1, -s*0.8, -s*0.7, -s*0.72, -s*0.15);
      ctx.bezierCurveTo(-s*0.68, s*0.45, -s*0.4, s*0.95, 0, s);
      ctx.bezierCurveTo(s*0.4, s*0.95, s*0.68, s*0.45, s*0.72, -s*0.15);
      ctx.bezierCurveTo(s*0.8, -s*0.7, s*0.25, -s*1.1, 0, -s*0.95);
    } else if (shape === 2) {
      // Wide/squat apple
      ctx.moveTo(0, -s * 0.75);
      ctx.bezierCurveTo(-s*0.35, -s*0.95, -s, -s*0.5, -s*0.95, 0);
      ctx.bezierCurveTo(-s*0.9, s*0.5, -s*0.5, s*0.78, 0, s*0.8);
      ctx.bezierCurveTo(s*0.5, s*0.78, s*0.9, s*0.5, s*0.95, 0);
      ctx.bezierCurveTo(s, -s*0.5, s*0.35, -s*0.95, 0, -s*0.75);
    } else if (shape === 3) {
      // Lopsided apple — slightly tilted
      ctx.moveTo(s*0.05, -s * 0.88);
      ctx.bezierCurveTo(-s*0.25, -s*1.0, -s*0.92, -s*0.55, -s*0.8, -s*0.05);
      ctx.bezierCurveTo(-s*0.72, s*0.5, -s*0.38, s*0.88, s*0.05, s*0.9);
      ctx.bezierCurveTo(s*0.5, s*0.88, s*0.85, s*0.45, s*0.88, -s*0.05);
      ctx.bezierCurveTo(s*0.9, -s*0.55, s*0.35, -s*1.05, s*0.05, -s*0.88);
    } else {
      // Heart-shaped apple — deeper indent at top
      ctx.moveTo(0, -s * 0.7);
      ctx.bezierCurveTo(-s*0.45, -s*1.15, -s*1.0, -s*0.55, -s*0.82, 0);
      ctx.bezierCurveTo(-s*0.65, s*0.55, -s*0.35, s*0.88, 0, s*0.92);
      ctx.bezierCurveTo(s*0.35, s*0.88, s*0.65, s*0.55, s*0.82, 0);
      ctx.bezierCurveTo(s*1.0, -s*0.55, s*0.45, -s*1.15, 0, -s*0.7);
    }
    ctx.closePath();

    // Fill base color
    ctx.fillStyle = baseR;
    ctx.fill();

    // Dark side shading (right side)
    ctx.save();
    ctx.clip();
    ctx.fillStyle = darkR;
    ctx.beginPath();
    ctx.ellipse(s*0.35, s*0.1, s*0.7, s*0.9, 0.15, 0, Math.PI*2);
    ctx.fill();

    // Light side highlight (left side)
    ctx.fillStyle = lightR;
    ctx.beginPath();
    ctx.ellipse(-s*0.25, -s*0.15, s*0.5, s*0.65, -0.1, 0, Math.PI*2);
    ctx.fill();

    // Specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(-s*0.22, -s*0.35, s*0.2, s*0.15, -0.5, 0, Math.PI*2);
    ctx.fill();

    // Subtle bottom shadow inside apple
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, s*0.6, s*0.6, s*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Stem — slightly curved, varies per shape
    const stemLen = s * (0.45 + (shape % 3) * 0.08);
    const stemCurve = (shape % 2 === 0) ? 2.5 : -2;
    ctx.strokeStyle = '#5a3510';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.8);
    ctx.quadraticCurveTo(stemCurve, -s * 0.8 - stemLen * 0.6, stemCurve * 0.3, -s * 0.8 - stemLen);
    ctx.stroke();

    // Leaf — size and angle varies
    const leafSide = (shape % 2 === 0) ? 1 : -1;
    const leafSize = s * (0.5 + (shape % 3) * 0.1);
    ctx.fillStyle = hue > 0.5 ? '#4a9930' : '#3a7a22';
    ctx.beginPath();
    ctx.moveTo(stemCurve * 0.5, -s * 0.8 - stemLen * 0.4);
    ctx.quadraticCurveTo(
      leafSide * leafSize * 1.2, -s * 0.8 - stemLen * 0.4 - leafSize * 0.6,
      leafSide * leafSize * 0.7, -s * 0.8 - stemLen * 0.15
    );
    ctx.quadraticCurveTo(
      leafSide * leafSize * 0.3, -s * 0.8 - stemLen * 0.3,
      stemCurve * 0.5, -s * 0.8 - stemLen * 0.4
    );
    ctx.fill();

    // Leaf vein
    ctx.strokeStyle = 'rgba(0,80,0,0.3)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(stemCurve * 0.5, -s * 0.8 - stemLen * 0.4);
    ctx.lineTo(leafSide * leafSize * 0.5, -s * 0.8 - stemLen * 0.3);
    ctx.stroke();

    ctx.restore();
  }

  function drawApples() {
    apples.forEach(a => {
      const groundY = a.lane === 0 ? lowerAt(a.x) : upperAt(a.x);
      const ay = groundY - a.floatH;
      drawApple(a.x, ay, a.size, a.bob, a.shape, a.hue);
    });
  }

  function checkAppleCollect() {
    // Horse body box: from head (horse.y - 100) to hooves (horse.y)
    const hLeft = hsx - 30, hRight = hsx + 54;
    const hTop = horse.y - 105, hBot = horse.y + 5;
    const pad = 18; // forgiving padding around hitbox
    apples = apples.filter(a => {
      if (a.lane !== horse.lane) return true;
      const groundY = a.lane === 0 ? lowerAt(a.x) : upperAt(a.x);
      const ay = groundY - a.floatH;
      // Rectangle overlap: is the apple inside (or near) Raven's body?
      const hit = a.x > hLeft - pad && a.x < hRight + pad
               && ay > hTop - pad && ay < hBot + pad;
      if (hit) {
        // Collected!
        score++;
        horse.eating = true; horse.eatT = 0;
        playCollectSound();
        // Spawn sparkle effect
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          collectFx.push({
            x: a.x, y: ay,
            vx: Math.cos(angle) * (2 + Math.random() * 2),
            vy: Math.sin(angle) * (2 + Math.random() * 2) - 1,
            life: 1,
            size: 2 + Math.random() * 2,
          });
        }
        return false;
      }
      return true;
    });
  }

  function updateCollectFx() {
    collectFx.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.06;
      p.life -= 0.04;
      p.size *= 0.97;
    });
    collectFx = collectFx.filter(p => p.life > 0);
  }

  function drawCollectFx() {
    collectFx.forEach(p => {
      ctx.fillStyle = `rgba(255,215,0,${p.life})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,255,200,${p.life * 0.6})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI*2); ctx.fill();
    });
  }

  // ── Confetti celebration ────────────────────────────────────────────────────

  const CONFETTI_COLORS = ['#ff4444','#44dd44','#4488ff','#ffdd00','#ff88dd','#44ffee','#ffaa22'];

  function spawnConfetti() {
    confetti = [];
    for (let i = 0; i < 80; i++) {
      confetti.push({
        x: Math.random() * W,
        y: -20 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 4,
        vy: 1.5 + Math.random() * 3,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.2,
        w: 6 + Math.random() * 6,
        h: 4 + Math.random() * 4,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        life: 1,
      });
    }
  }

  function updateConfetti() {
    confetti.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.03; // gentle gravity
      p.vx += (Math.random() - 0.5) * 0.3; // flutter
      p.rot += p.rotV;
      if (p.y > H + 20) p.life = 0;
    });
    confetti = confetti.filter(p => p.life > 0);
  }

  function drawConfetti() {
    confetti.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
  }

  // ── Lava (Level 4 only) ────────────────────────────────────────────────────

  function spawnLava() {
    const lane = Math.random() < 0.5 ? 0 : 1;
    // Pick a random mountain peak Y to flow from (between 50-120 = mountain area)
    const peakY = 40 + Math.random() * 60;
    // Slight horizontal wobble for the stream path
    const wobble = (Math.random() - 0.5) * 30;
    lavaFlows.push({
      x: W + 60,
      lane: lane,
      peakY: peakY,       // where the stream starts (mountain peak)
      wobble: wobble,      // how much the stream curves sideways
      w: 45 + Math.random() * 35,   // width of pool at the bottom
      glow: Math.random() * 6,
    });
  }

  function drawLava() {
    lavaFlows.forEach(lv => {
      const groundY = lv.lane === 0 ? lowerAt(lv.x + lv.w/2) : upperAt(lv.x + lv.w/2);
      const poolCX = lv.x + lv.w / 2;
      const t = lv.glow;

      // ── Flowing stream from mountain peak down to trail ──
      const streamTop = lv.peakY;
      const streamBot = groundY - 2;
      const streamH = streamBot - streamTop;

      // Draw stream as stacked ellipses — same technique as the pool
      // Each slice is a little ellipse: red outside, orange middle, yellow core
      for (let i = 0; i <= 20; i++) {
        const frac = i / 20;
        const y = streamTop + frac * streamH;
        const wx = Math.sin(frac * 3 + t * 0.5) * lv.wobble * frac;
        const cx = poolCX + wx;
        const r = 2 + frac * frac * 11; // radius grows toward bottom

        // Glow
        ctx.fillStyle = 'rgba(255,60,0,0.15)';
        ctx.beginPath(); ctx.ellipse(cx, y, r * 2, r * 0.8, 0, 0, Math.PI * 2); ctx.fill();
        // Red outer
        ctx.fillStyle = '#dd2200';
        ctx.beginPath(); ctx.ellipse(cx, y, r, r * 0.45, 0, 0, Math.PI * 2); ctx.fill();
        // Orange middle
        ctx.fillStyle = '#ff6600';
        ctx.beginPath(); ctx.ellipse(cx, y, r * 0.65, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
        // Yellow-hot core
        ctx.fillStyle = '#ffcc22';
        ctx.beginPath(); ctx.ellipse(cx, y, r * 0.3, r * 0.15, 0, 0, Math.PI * 2); ctx.fill();
      }

      // ── Glow at the source (crater) ──
      const craterGlow = ctx.createRadialGradient(poolCX, streamTop, 2, poolCX, streamTop, 20);
      craterGlow.addColorStop(0, 'rgba(255,200,50,0.6)');
      craterGlow.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = craterGlow;
      ctx.beginPath(); ctx.arc(poolCX, streamTop, 20, 0, Math.PI * 2); ctx.fill();

      // ── Lava pool at the bottom ──
      // Glow around pool
      const poolGlow = ctx.createRadialGradient(poolCX, groundY, 3, poolCX, groundY, lv.w * 0.6);
      poolGlow.addColorStop(0, 'rgba(255,100,0,0.35)');
      poolGlow.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = poolGlow;
      ctx.fillRect(poolCX - lv.w * 0.6, groundY - lv.w * 0.4, lv.w * 1.2, lv.w * 0.6);

      // Pool shape
      ctx.fillStyle = '#dd2200';
      ctx.beginPath();
      ctx.ellipse(poolCX, groundY - 2, lv.w / 2, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bright center
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.ellipse(poolCX, groundY - 3, lv.w / 3, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Hot core
      ctx.fillStyle = '#ffcc22';
      ctx.beginPath();
      ctx.ellipse(poolCX, groundY - 4, lv.w / 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Bubbles in the pool
      lv.glow += 0.06;
      for (let i = 0; i < 3; i++) {
        const bx = poolCX + Math.sin(t + i * 2.1) * lv.w * 0.25;
        const by = groundY - 4 + Math.sin(t * 1.5 + i) * 2;
        ctx.fillStyle = 'rgba(255,200,50,0.6)';
        ctx.beginPath(); ctx.arc(bx, by, 1.5 + Math.sin(t + i) * 1, 0, Math.PI * 2); ctx.fill();
      }

      // Smoke rising from the pool
      for (let i = 0; i < 2; i++) {
        const sx = poolCX - 8 + i * 16;
        const smokeY = groundY - 12 - Math.sin(t + i * 1.5) * 8;
        ctx.fillStyle = `rgba(60,20,0,${0.12 + Math.sin(t + i) * 0.06})`;
        ctx.beginPath(); ctx.arc(sx, smokeY, 4 + Math.sin(t) * 2, 0, Math.PI * 2); ctx.fill();
      }
    });
  }

  function checkLavaCollision() {
    for (const lv of lavaFlows) {
      if (lv.lane !== horse.lane) continue;
      const hx = hsx - 20, hw = 60;
      const poolLeft = lv.x, poolRight = lv.x + lv.w;
      if (hx < poolRight && hx + hw > poolLeft && horse.onGround) {
        return true;
      }
    }
    return false;
  }

  // ── Rolling Boulders (Level 3 only) ────────────────────────────────────────

  function spawnRollingBoulder() {
    const lane = Math.random() < 0.5 ? 0 : 1;
    const peakY = 50 + Math.random() * 50;
    const radius = 14 + Math.random() * 10;
    // Lower path is further down, so boulder needs to roll faster to arrive in time
    const dist = (lane === 0 ? LOWER_Y : UPPER_Y) - peakY;
    const baseSpeed = 0.018 + Math.random() * 0.008;
    rollingBoulders.push({
      x: W + 40,
      lane: lane,
      peakY: peakY,
      radius: radius,
      rot: 0,
      rolling: true,
      rollFrac: 0,
      rollSpeed: baseSpeed * (180 / Math.max(100, dist)), // normalize so it lands at roughly same time
    });
  }

  function updateRollingBoulders() {
    rollingBoulders.forEach(rb => {
      if (rb.rolling) {
        rb.rollFrac += rb.rollSpeed;
        if (rb.rollFrac >= 1) {
          rb.rollFrac = 1;
          rb.rolling = false;
        }
      }
      rb.x -= speed;
      rb.rot += speed * 0.08; // spin as it moves with the world
    });
    rollingBoulders = rollingBoulders.filter(rb => rb.x > -40);
  }

  function drawRollingBoulders() {
    rollingBoulders.forEach(rb => {
      const groundY = rb.lane === 0 ? lowerAt(rb.x) : upperAt(rb.x);
      const streamH = groundY - rb.peakY;
      // Boulder position along the slope
      const frac = rb.rollFrac;
      // Ease-in for acceleration feel
      const easeFrac = frac * frac;
      const bx = rb.x;
      const by = rb.peakY + easeFrac * streamH - rb.radius;
      const r = rb.radius;

      // Trail of dust/sparks behind the rolling boulder on the slope
      if (rb.rolling) {
        for (let i = 1; i <= 4; i++) {
          const trailFrac = Math.max(0, frac - i * 0.04);
          const ef = trailFrac * trailFrac;
          const tx = bx + i * 3;
          const ty = rb.peakY + ef * streamH - r * 0.5;
          const ta = 0.3 - i * 0.06;
          ctx.fillStyle = `rgba(180,170,150,${Math.max(0, ta)})`;
          ctx.beginPath(); ctx.arc(tx, ty, 3 + i, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Shadow under boulder
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(bx, by + r + 3, r * 0.8, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Boulder body
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(rb.rot);

      // Dark volcanic rock
      const t = performance.now() * 0.001;
      const glow = 0.7 + 0.3 * Math.sin(t * 2.5 + rb.x);
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

      // Slightly lighter patches
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.2, r * 0.4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(r * 0.2, r * 0.3, r * 0.3, 0, Math.PI * 2); ctx.fill();

      // Glowing lava cracks
      const r1 = Math.floor(255 * glow), g1 = Math.floor(120 * glow);
      const r2 = Math.floor(255 * glow), g2 = Math.floor(60 * glow);
      ctx.shadowColor = `rgba(255,80,0,${0.5*glow})`; ctx.shadowBlur = 6;
      ctx.strokeStyle = `rgb(${r1},${g1},0)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-r * 0.5, -r * 0.1);
      ctx.lineTo(0, 0);
      ctx.lineTo(r * 0.2, r * 0.4);
      ctx.stroke();
      ctx.strokeStyle = `rgb(${r2},${g2},0)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(r * 0.4, -r * 0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-r * 0.3, r * 0.35);
      ctx.stroke();
      // Hot spots at crack junctions
      ctx.fillStyle = `rgb(255,${Math.floor(180*glow)},0)`;
      ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;

      ctx.restore();
    });
  }

  function checkBoulderCollision() {
    for (const rb of rollingBoulders) {
      if (rb.lane !== horse.lane || rb.rolling) continue; // only dangerous once on trail
      const groundY = rb.lane === 0 ? lowerAt(rb.x) : upperAt(rb.x);
      const by = groundY - rb.radius;
      const hx = hsx - 20, hy = horse.y - 100, hw = 60, hh = 100;
      // Circle vs rectangle collision
      const closestX = Math.max(hx, Math.min(rb.x, hx + hw));
      const closestY = Math.max(hy, Math.min(by, hy + hh));
      const dx = rb.x - closestX, dy = by - closestY;
      if (dx * dx + dy * dy < rb.radius * rb.radius) return true;
    }
    return false;
  }

  // ── Hazard Cars (NYC Level) ────────────────────────────────────────────────

  function spawnHazardCar() {
    const lane = Math.random() < 0.5 ? 0 : 1;
    hazardCars.push({
      x: W + 80,
      lane,
      speed: speed * 1.8 + Math.random() * 2,
      w: 70,
      h: 35,
      color: ['#ffcc00','#ffcc00','#ffcc00','#ffcc00','#3366dd','#ffffff'][Math.floor(Math.random()*6)], // mostly yellow cabs!
    });
  }

  function updateHazardCars() {
    hazardCars.forEach(c => { c.x -= c.speed; });
    hazardCars = hazardCars.filter(c => c.x + c.w > -30);
  }

  function drawHazardCars() {
    hazardCars.forEach(c => {
      const gy = c.lane === 0 ? lowerAt(c.x) : upperAt(c.x);
      const y = gy - c.h;
      const x = c.x, w = c.w, h = c.h;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(x+w/2, gy+2, w*0.45, 3, 0, 0, Math.PI*2); ctx.fill();
      // Car body
      ctx.fillStyle = c.color;
      ctx.beginPath(); ctx.roundRect(x, y+h*0.35, w, h*0.55, 4); ctx.fill();
      // Roof
      ctx.beginPath();
      ctx.moveTo(x+w*0.15, y+h*0.35); ctx.lineTo(x+w*0.25, y+h*0.05);
      ctx.lineTo(x+w*0.7, y+h*0.05); ctx.lineTo(x+w*0.8, y+h*0.35);
      ctx.closePath(); ctx.fill();
      // Windows
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.moveTo(x+w*0.2, y+h*0.35); ctx.lineTo(x+w*0.27, y+h*0.1);
      ctx.lineTo(x+w*0.45, y+h*0.1); ctx.lineTo(x+w*0.45, y+h*0.35);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x+w*0.5, y+h*0.35); ctx.lineTo(x+w*0.5, y+h*0.1);
      ctx.lineTo(x+w*0.68, y+h*0.1); ctx.lineTo(x+w*0.75, y+h*0.35);
      ctx.closePath(); ctx.fill();
      // Wheels
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(x+w*0.2, y+h*0.9, h*0.14, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+w*0.8, y+h*0.9, h*0.14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.arc(x+w*0.2, y+h*0.9, h*0.05, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+w*0.8, y+h*0.9, h*0.05, 0, Math.PI*2); ctx.fill();
      // Taxi sign (if yellow)
      if (c.color === '#ffcc00') {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.roundRect(x+w*0.4, y-2, w*0.2, 7, 2); ctx.fill();
        ctx.fillStyle = '#222'; ctx.font = '5px Arial';
        ctx.fillText('TAXI', x+w*0.41, y+4);
      }
      // Headlights
      ctx.fillStyle = '#ffee88';
      ctx.beginPath(); ctx.arc(x+2, y+h*0.5, 2.5, 0, Math.PI*2); ctx.fill();
      // Taillights
      ctx.fillStyle = '#ff3333';
      ctx.beginPath(); ctx.arc(x+w-2, y+h*0.5, 2.5, 0, Math.PI*2); ctx.fill();
    });
  }

  function checkCarCollision() {
    for (const c of hazardCars) {
      if (c.lane !== horse.lane) continue;
      const gy = c.lane === 0 ? lowerAt(c.x) : upperAt(c.x);
      const cy = gy - c.h;
      const hx = hsx - 20, hy = horse.y - 100, hw = 60, hh = 100;
      if (hx < c.x + c.w && hx + hw > c.x && hy < cy + c.h && hy + hh > cy) return true;
    }
    return false;
  }

  // ── Obstacles ──────────────────────────────────────────────────────────────

  function drawBoulder(x, y, w, h) {
    const cx = x+w*0.5, cy = y+h*0.55;
    const t = performance.now() * 0.001;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(cx, y+h+3, w*0.45, 6, 0, 0, Math.PI*2); ctx.fill();
    // Dark volcanic rock base
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.5, h*0.48, 0.15, 0, Math.PI*2); ctx.fill();
    // Slightly lighter rock surface
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath(); ctx.ellipse(cx-w*0.06, cy-h*0.04, w*0.4, h*0.38, -0.1, 0, Math.PI*2); ctx.fill();
    // Dark charcoal highlights
    ctx.fillStyle = '#383838';
    ctx.beginPath(); ctx.ellipse(cx-w*0.15, cy-h*0.18, w*0.16, h*0.12, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+w*0.12, cy+h*0.08, w*0.12, h*0.09, 0.3, 0, Math.PI*2); ctx.fill();
    // Glowing lava cracks — pulsing brightness
    const glow = 0.7 + 0.3 * Math.sin(t * 2.5);
    const r1 = Math.floor(255 * glow), g1 = Math.floor(120 * glow);
    const r2 = Math.floor(255 * glow), g2 = Math.floor(60 * glow);
    // Main crack
    ctx.strokeStyle = `rgb(${r1},${g1},0)`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = `rgba(255,80,0,${0.5*glow})`; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(cx-w*0.2, cy-h*0.3);
    ctx.lineTo(cx-w*0.05, cy-h*0.05);
    ctx.lineTo(cx+w*0.1, cy+h*0.1);
    ctx.lineTo(cx+w*0.05, cy+h*0.3);
    ctx.stroke();
    // Branch crack
    ctx.strokeStyle = `rgb(${r2},${g2},0)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx-w*0.05, cy-h*0.05);
    ctx.lineTo(cx+w*0.2, cy-h*0.15);
    ctx.lineTo(cx+w*0.28, cy+h*0.05);
    ctx.stroke();
    // Small side crack
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx+w*0.1, cy+h*0.1);
    ctx.lineTo(cx-w*0.12, cy+h*0.2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Tiny lava dots in cracks
    ctx.fillStyle = `rgb(255,${Math.floor(180*glow)},0)`;
    ctx.beginPath(); ctx.arc(cx-w*0.05, cy-h*0.05, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+w*0.1, cy+h*0.1, 2, 0, Math.PI*2); ctx.fill();
    // Subtle orange glow around rock
    ctx.strokeStyle = `rgba(255,60,0,${0.15*glow})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.52, h*0.5, 0.15, 0, Math.PI*2); ctx.stroke();
  }

  function drawLog(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h+3, w*0.45, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6B3A1F';
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 5); ctx.fill();
    ctx.fillStyle = '#8B5A35';
    ctx.beginPath(); ctx.roundRect(x+2, y+2, w-4, h*0.35, [4,4,0,0]); ctx.fill();
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      ctx.strokeStyle = i%2===0 ? '#4a2410' : '#7a4828';
      const ly = y+4+i*(h-6)/6;
      ctx.beginPath(); ctx.moveTo(x+12, ly);
      ctx.bezierCurveTo(x+w*0.3, ly+2, x+w*0.7, ly-2, x+w-12, ly); ctx.stroke();
    }
    ctx.fillStyle = '#3a1808';
    ctx.beginPath(); ctx.ellipse(x+w*0.55, y+h*0.38, 5, 4, 0.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+w*0.3, y+h*0.7, 4, 3, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9B6040';
    ctx.beginPath(); ctx.ellipse(x+7, y+h/2, 7, h/2-2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#7a4828'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(x+7, y+h/2, 5, h/2-5, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x+7, y+h/2, 3, h/2-8, 0, 0, Math.PI*2); ctx.stroke();
  }

  // ── Themed obstacle drawing ─────────────────────────────────────────────

  function drawCafeTable(x, y, w, h) {
    // Small round café table with red/white checkered cloth
    ctx.fillStyle = '#3a2a18'; // legs
    ctx.fillRect(x+w*0.3, y+h*0.5, 3, h*0.5); ctx.fillRect(x+w*0.6, y+h*0.5, 3, h*0.5);
    ctx.fillStyle = '#8a4422'; // table top
    ctx.beginPath(); ctx.ellipse(x+w*0.5, y+h*0.4, w*0.5, h*0.15, 0, 0, Math.PI*2); ctx.fill();
    // Checkered cloth
    ctx.fillStyle = '#cc2222';
    ctx.beginPath(); ctx.ellipse(x+w*0.5, y+h*0.38, w*0.45, h*0.12, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.ellipse(x+w*0.3+i*w*0.12, y+h*0.38, w*0.05, h*0.06, 0, 0, Math.PI*2); ctx.fill();
    }
    // Coffee cup on top
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x+w*0.4, y+h*0.15, 8, 10);
    ctx.fillStyle = '#6a3a15';
    ctx.fillRect(x+w*0.4+1, y+h*0.15+1, 6, 5);
  }

  function drawFlowerCart(x, y, w, h) {
    // Wooden cart with colorful flowers
    ctx.fillStyle = '#6a4a28'; // cart body
    ctx.beginPath(); ctx.roundRect(x+2, y+h*0.3, w-4, h*0.5, 3); ctx.fill();
    // Wheels
    ctx.fillStyle = '#4a3018';
    ctx.beginPath(); ctx.arc(x+w*0.2, y+h-2, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.8, y+h-2, 5, 0, Math.PI*2); ctx.fill();
    // Flowers (colorful puffs on top)
    const fcolors = ['#ff4466','#ffaa22','#ff66aa','#ffdd44','#ff6644','#dd44ff'];
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = fcolors[i];
      ctx.beginPath(); ctx.arc(x+6+i*(w-12)/4, y+h*0.2, 6, 0, Math.PI*2); ctx.fill();
    }
    // Leaves
    ctx.fillStyle = '#2a8a22';
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.ellipse(x+10+i*(w-16)/3, y+h*0.32, 5, 3, 0.3, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawIceChunk(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h+2, w*0.4, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8ab8cc';
    ctx.beginPath(); ctx.moveTo(x, y+h); ctx.lineTo(x+w*0.2, y); ctx.lineTo(x+w*0.5, y+h*0.1);
    ctx.lineTo(x+w*0.8, y-h*0.05); ctx.lineTo(x+w, y+h); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#aad8ee';
    ctx.beginPath(); ctx.moveTo(x+w*0.1, y+h*0.6); ctx.lineTo(x+w*0.25, y+h*0.1);
    ctx.lineTo(x+w*0.45, y+h*0.2); ctx.lineTo(x+w*0.3, y+h*0.7); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.ellipse(x+w*0.3, y+h*0.3, w*0.08, h*0.06, -0.3, 0, Math.PI*2); ctx.fill();
  }

  function drawSnowLog(x, y, w, h) {
    drawLog(x, y, w, h);
    ctx.fillStyle = 'rgba(230,240,250,0.7)';
    ctx.beginPath(); ctx.ellipse(x+w*0.5, y+3, w*0.45, h*0.2, 0, 0, Math.PI*2); ctx.fill();
  }

  function drawHayBale(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h+2, w*0.4, 4, 0, 0, Math.PI*2); ctx.fill();
    // Round hay bale
    ctx.fillStyle = '#c8a840';
    ctx.beginPath(); ctx.ellipse(x+w*0.5, y+h*0.5, w*0.48, h*0.48, 0, 0, Math.PI*2); ctx.fill();
    // Spiral pattern
    ctx.strokeStyle = '#a88830'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(x+w*0.5, y+h*0.5, w*0.3, h*0.3, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x+w*0.5, y+h*0.5, w*0.15, h*0.15, 0, 0, Math.PI*2); ctx.stroke();
    // Straw texture
    ctx.fillStyle = '#ddc050';
    ctx.beginPath(); ctx.ellipse(x+w*0.35, y+h*0.3, w*0.1, h*0.06, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#b89838';
    ctx.beginPath(); ctx.ellipse(x+w*0.6, y+h*0.65, w*0.08, h*0.05, -0.3, 0, Math.PI*2); ctx.fill();
  }

  function drawWoodenCrate(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h+2, w*0.4, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a6430';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#9a7440';
    ctx.fillRect(x+2, y+2, w-4, h*0.45);
    // Planks
    ctx.strokeStyle = '#6a4a20'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y+h*0.5); ctx.lineTo(x+w, y+h*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w*0.33, y); ctx.lineTo(x+w*0.33, y+h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w*0.67, y); ctx.lineTo(x+w*0.67, y+h); ctx.stroke();
    // Nails
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(x+w*0.33, y+h*0.25, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.67, y+h*0.75, 1.5, 0, Math.PI*2); ctx.fill();
  }

  function drawDeer(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h+2, w*0.35, 3, 0, 0, Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle = '#8a6030';
    ctx.beginPath(); ctx.ellipse(x+w*0.5, y+h*0.55, w*0.4, h*0.3, 0, 0, Math.PI*2); ctx.fill();
    // Legs
    ctx.fillRect(x+w*0.2, y+h*0.7, 3, h*0.3); ctx.fillRect(x+w*0.35, y+h*0.7, 3, h*0.3);
    ctx.fillRect(x+w*0.6, y+h*0.7, 3, h*0.3); ctx.fillRect(x+w*0.72, y+h*0.7, 3, h*0.3);
    // Head

  function drawCactusObs(x, y, w, h) {

  function drawRattlesnake(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h+1, w*0.4, 3, 0, 0, Math.PI*2); ctx.fill();
    // Coiled snake body
    ctx.strokeStyle = '#8a6a30'; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(x, y+h*0.7);
    ctx.bezierCurveTo(x+w*0.2, y+h*0.3, x+w*0.3, y+h, x+w*0.5, y+h*0.5);
    ctx.bezierCurveTo(x+w*0.7, y, x+w*0.8, y+h*0.8, x+w, y+h*0.4);
    ctx.stroke();
    // Diamond pattern
    ctx.strokeStyle = '#5a4a20'; ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const sx = x+w*0.15+i*w*0.2;
      const sy2 = y+h*0.5 + Math.sin(i*1.5)*h*0.2;
      ctx.beginPath(); ctx.moveTo(sx, sy2-3); ctx.lineTo(sx+5, sy2); ctx.lineTo(sx, sy2+3); ctx.lineTo(sx-5, sy2); ctx.closePath(); ctx.stroke();
    }
    // Head (raised, ready to strike)
    ctx.fillStyle = '#7a5a28';
    ctx.beginPath(); ctx.arc(x+w*0.95, y+h*0.3, 5, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.arc(x+w*0.97, y+h*0.28, 1.5, 0, Math.PI*2); ctx.fill();
    // Rattle tail
    ctx.fillStyle = '#aa8a50';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.arc(x+4+i*4, y+h*0.7+i*2, 3-i*0.5, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawCar(x, y, w, h) {

    ctx.beginPath();

  function getGallopLeg(kf, t) {
    const fi = t * 8, i0 = Math.floor(fi) % 8, i1 = (i0+1) % 8, f = fi - Math.floor(fi);
    return [lerp(kf[i0][0], kf[i1][0], f), lerp(kf[i0][1], kf[i1][1], f), lerp(kf[i0][2], kf[i1][2], f)];
  }

  function drawArticulatedLeg(ox, oy, shoulder, knee, fetlock, segs, color) {
    const [uL, lL, cL] = segs;
    const sa = deg(shoulder), ka = deg(knee), fa = deg(fetlock);
    ctx.save(); ctx.translate(ox, oy);
    // Upper leg — thick, muscular (Spirit's powerful legs)
    ctx.rotate(sa);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(-4.5,uL); ctx.lineTo(4.5,uL); ctx.lineTo(6,0); ctx.closePath(); ctx.fill();
    // Upper leg muscle highlight
    ctx.fillStyle = color === '#0a0a0a' ? '#151515' : '#1c1c1c';
    ctx.beginPath(); ctx.ellipse(0, uL*0.4, 5, uL*0.35, 0, 0, Math.PI*2); ctx.fill();
    // Knee joint bulge
    ctx.translate(0, uL); ctx.rotate(ka);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0, 0, 6, 4.5, 0, 0, Math.PI*2); ctx.fill();
    // Lower leg — defined tendons
    ctx.beginPath(); ctx.moveTo(-3.8,0); ctx.lineTo(-3.2,lL); ctx.lineTo(3.2,lL); ctx.lineTo(3.8,0); ctx.closePath(); ctx.fill();
    // Tendon line
    ctx.strokeStyle = color === '#0a0a0a' ? '#141414' : '#1a1a1a';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-2, 2); ctx.lineTo(-2.5, lL-1); ctx.stroke();
    // Fetlock joint — with tuft of hair
    ctx.translate(0, lL); ctx.rotate(fa);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0, 0, 4.5, 4, 0, 0, Math.PI*2); ctx.fill();
    // Cannon/pastern — slender
    ctx.beginPath(); ctx.moveTo(-3,0); ctx.lineTo(-2.5,cL); ctx.lineTo(2.5,cL); ctx.lineTo(3,0); ctx.closePath(); ctx.fill();
    // Hoof — hard, defined, slightly angled
    ctx.translate(0, cL);
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath();
    ctx.moveTo(-6, 0); ctx.lineTo(-7, 4); ctx.lineTo(6, 5); ctx.lineTo(7, 1); ctx.lineTo(5, -1);
    ctx.closePath(); ctx.fill();
    // Hoof shine
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(0, 2, 4, 2.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── HEAD & NECK — thick muscular arched neck, refined head ────────────────

  function drawRavenHead(x, y, tilt) {

    // Neck muscle definition

    // Neck sheen
    ctx.fillStyle = '#282828';
    ctx.beginPath(); ctx.ellipse(42, -106, 6, 18, 0.3, 0, Math.PI*2); ctx.fill();
    // Jugular groove
    ctx.strokeStyle = '#080808'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(34, -78); ctx.bezierCurveTo(42, -90, 50, -104, 52, -114);
    ctx.stroke();
    // Throatlatch definition
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(48, -118); ctx.bezierCurveTo(44, -114, 38, -106, 34, -96);
    ctx.stroke();

    // Spirit-style head — broad forehead, tapered muzzle, strong jaw, dish face
    ctx.fillStyle = '#0c0c0c';
    ctx.beginPath();
    ctx.moveTo(50, -126);                                    // poll
    ctx.bezierCurveTo(56, -131, 66, -130, 74, -124);        // wide forehead (Spirit's broad brow)
    ctx.bezierCurveTo(80, -118, 84, -110, 84, -102);        // bridge of nose (slight dish)
    ctx.bezierCurveTo(84, -96, 83, -92, 80, -88);           // nose tapers to muzzle
    ctx.bezierCurveTo(78, -85, 74, -84, 70, -84);           // soft muzzle
    ctx.bezierCurveTo(64, -84, 58, -86, 56, -92);           // chin/jaw
    ctx.bezierCurveTo(52, -98, 48, -110, 48, -120);         // strong jawline to throatlatch
    ctx.bezierCurveTo(48, -123, 49, -126, 50, -126);        // back to poll
    ctx.closePath(); ctx.fill();

    // Cheekbone — prominent like Spirit
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(64, -108, 12, 10, -0.15, 0, Math.PI*2); ctx.fill();
    // Jaw muscle
    ctx.fillStyle = '#161616';
    ctx.beginPath(); ctx.ellipse(58, -98, 8, 6, -0.3, 0, Math.PI*2); ctx.fill();
    // Forehead highlight

    ctx.beginPath(); ctx.ellipse(70, -120, 8, 5, -0.2, 0, Math.PI*2); ctx.fill();
    // Nose bridge — slight dish (Spirit's characteristic profile)
    ctx.fillStyle = '#1e1e1e';
    ctx.beginPath();
    ctx.moveTo(76, -118); ctx.bezierCurveTo(80, -114, 83, -108, 84, -102);
    ctx.bezierCurveTo(82, -106, 78, -112, 74, -116);
    ctx.closePath(); ctx.fill();

    // Muzzle — soft, velvety
    ctx.fillStyle = '#181818';
    ctx.beginPath(); ctx.ellipse(76, -88, 10, 8, 0.1, 0, Math.PI*2); ctx.fill();
    // Muzzle sheen
    ctx.fillStyle = '#242424';
    ctx.beginPath(); ctx.ellipse(78, -90, 5, 4, 0.1, 0, Math.PI*2); ctx.fill();
    // Nostrils — flared, expressive (Spirit shows emotion through nostrils)
    ctx.fillStyle = '#3a1218';
    ctx.beginPath(); ctx.ellipse(83, -88, 4.5, 3.2, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a0a12';
    ctx.beginPath(); ctx.ellipse(82, -87, 3.2, 2.2, 0.4, 0, Math.PI*2); ctx.fill();
    // Lower lip line
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1;
