    // Eye — Spirit's iconic large, almond-shaped, deeply expressive eye
    // White (sclera)
    ctx.fillStyle = '#f0ece6';
    ctx.beginPath(); ctx.ellipse(66, -118, 8, 5.5, -0.1, 0, Math.PI*2); ctx.fill();
    // Iris — warm amber-brown (Spirit's eye color, darkened for Raven)
    ctx.fillStyle = '#3a1c0a';
    ctx.beginPath(); ctx.ellipse(67, -118, 5.5, 5.2, 0, 0, Math.PI*2); ctx.fill();
    // Pupil — large, deep
    ctx.fillStyle = '#080200';
    ctx.beginPath(); ctx.ellipse(67.5, -118, 3.2, 3.5, 0, 0, Math.PI*2); ctx.fill();
    // Life spark — bright catchlight
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(69.5, -119.5, 2, 0, Math.PI*2); ctx.fill();
    // Secondary catchlight
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath(); ctx.arc(65, -116.5, 1, 0, Math.PI*2); ctx.fill();
    // Eyelid — heavy, expressive (Spirit's defining feature)
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(66, -118, 8, -2.6, -0.5); ctx.stroke();
    // Lower lid
    ctx.strokeStyle = '#161616'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(66, -118, 7.5, 0.3, Math.PI-0.3); ctx.stroke();
    // Thick lashes — Spirit's expressive lashes
    ctx.strokeStyle = '#050505'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(66, -118, 8.5, -1.8, -0.8); ctx.stroke();
    // Brow ridge
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(58, -122); ctx.bezierCurveTo(62, -125, 70, -126, 74, -124);
    ctx.stroke();

    // Ears — tall, alert, expressive (Spirit always has perked ears)
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.moveTo(50,-126); ctx.bezierCurveTo(46,-136, 46,-146, 51,-152);
    ctx.bezierCurveTo(54,-146, 55,-136, 54,-128); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#0e0e0e';
    ctx.beginPath(); ctx.moveTo(55,-126); ctx.bezierCurveTo(52,-136, 53,-147, 58,-154);
    ctx.bezierCurveTo(62,-147, 62,-136, 59,-128); ctx.closePath(); ctx.fill();
    // Inner ear — warm pink
    ctx.fillStyle = '#2a0a0a';
    ctx.beginPath(); ctx.moveTo(56,-129); ctx.bezierCurveTo(53,-138, 54,-146, 57,-151);
    ctx.bezierCurveTo(60,-146, 61,-138, 58,-130); ctx.closePath(); ctx.fill();
    // Second ear inner
    ctx.fillStyle = '#280808';
    ctx.beginPath(); ctx.moveTo(51,-129); ctx.bezierCurveTo(48,-138, 47,-145, 51,-150);
    ctx.bezierCurveTo(53,-145, 54,-138, 53,-130); ctx.closePath(); ctx.fill();

    ctx.restore();
  }

  // ── MANE — 16 flowing strands + forelock ──────────────────────────────────

  function drawMane(x, y, tilt, gT, moving) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(tilt);
    ctx.lineCap = 'round';

    // Spirit's iconic wild mane — long, thick, flowing dramatically in the wind
    // 22 strands along the crest (poll to withers), much longer than before
    for (let i = 0; i < 22; i++) {
      const t = i / 21;
      const ax = lerp(54, 26, t);           // anchor along neck crest
      const ay = lerp(-130, -86, t);
      const windBase = moving ? 8 + t * 16 : 0;  // stronger wind on longer strands
      const w = moving ? Math.sin(gT*Math.PI*2 + i*0.55) * windBase : 0;
      const w2 = moving ? Math.cos(gT*Math.PI*1.4 + i*0.9) * (4 + t*8) : 0;
      const len = 22 + t * 24;              // strands get longer toward withers
      const endX = ax - len + w;
      const endY = ay - 6 - t*6 + w2;
      const midX = ax - len*0.5 + w*0.3;
      const midY = ay - 12 + w2*0.4;
      ctx.strokeStyle = ['#080808','#131313','#0c0c0c','#101010','#060606'][i % 5];
      ctx.lineWidth = 3.8 - t * 1.0;
      ctx.beginPath(); ctx.moveTo(ax, ay);
      ctx.bezierCurveTo(midX, midY, midX - 6 + w*0.6, endY + 4, endX, endY);
      ctx.stroke();
    }

    // Spirit's forelock — long, wild bangs sweeping across the forehead
    for (let i = 0; i < 8; i++) {
      const w = moving ? Math.sin(gT*Math.PI*2.2 + i*1.2) * 5 : 0;
      const w2 = moving ? Math.cos(gT*Math.PI*1.8 + i*0.8) * 3 : 0;
      ctx.strokeStyle = ['#080808','#111','#0a0a0a','#0e0e0e'][i % 4];
      ctx.lineWidth = 3 - i * 0.2;
      const sx = 53 + i*1.2;
      ctx.beginPath(); ctx.moveTo(sx, -128);
      ctx.bezierCurveTo(sx + 4 + w, -120, 62 + w, -114 + w2, 66 + w + i*0.5, -108 + w2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── TAIL — 10 thick flowing strands ───────────────────────────────────────

  function drawTailHair(x, y, tilt, gT, moving) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(tilt);
    ctx.lineCap = 'round';
    const bx = -56, by = -44;

    // Spirit's long, wild, dramatic tail — thick and flowing
    // Tail dock (the fleshy base)
    ctx.fillStyle = '#0c0c0c';
    ctx.beginPath();
    ctx.moveTo(bx, by - 4); ctx.bezierCurveTo(bx-4, by+2, bx-8, by+10, bx-10, by+16);
    ctx.bezierCurveTo(bx-6, by+14, bx-2, by+6, bx+2, by-2);
    ctx.closePath(); ctx.fill();

    // 14 thick flowing strands — much longer than before
    for (let i = 0; i < 14; i++) {
      const sp = (i - 6.5) * 4.5;
      const w = moving ? Math.sin(gT*Math.PI*1.1 + i*0.6) * 22 : 0;
      const w2 = moving ? Math.cos(gT*Math.PI*1.4 + i*0.85) * 12 : 0;
      const w3 = moving ? Math.sin(gT*Math.PI*0.8 + i*1.2) * 8 : 0;
      ctx.strokeStyle = ['#080808','#111','#0c0c0c','#0e0e0e','#060606'][i % 5];
      ctx.lineWidth = 4.2 - Math.abs(i - 6.5) * 0.35;
      ctx.beginPath(); ctx.moveTo(bx - 8, by + 12);
      ctx.bezierCurveTo(
        bx-24+w*0.3+sp*0.3, by+30+w3,
        bx-42+w*0.7+sp*0.5, by+56+w2,
        bx-54+w*1.4+sp, by+86+w2
      );
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── SPRITE-BASED HORSE RENDER ──────────────────────────────────────────────

  function selectHorseAnim(jp, moving) {
    if (state === 'dead') return 'idle';  // no death anim, just freeze
    if (horse.rearing) return 'rear';     // victory rear — uses idle frame + rotation
    if (state === 'waiting' && !horse.rearing) {
      // Grazing cycle: 5s grazing, 2s head up, repeat
      const cycle = grazeTimer % 7;
      return cycle < 5 ? 'graze' : 'idle';
    }
    if (jp !== 'none') return 'jump';
    if (moving) return 'gallop';
    return 'idle';
  }

  function getJumpFrame(jp, jt, totalFrames) {
    // Map 5 jump phases to frame ranges within the jump strip
    const map = {
      gather: [0, 2],
      launch: [2, 5],
      tuck:   [5, 9],
      extend: [9, 13],
      land:   [13, 15],
    };
    const range = map[jp] || [0, 0];
    const t = Math.min(jt / 0.3, 1);
    const frame = range[0] + Math.round(t * (range[1] - range[0]));
    return Math.min(frame, totalFrames - 1);
  }

  function drawHorseSprite(x, y, gT, jp, jt, moving) {
    if (!horseSpriteReady) return; // wait for image to load

    const animName = selectHorseAnim(jp, moving);
    const isRearing = animName === 'rear';
    const isGrazing = animName === 'graze';
    // For rearing, use gallop frame; for grazing, use idle frame + forward tilt
    const anim = isRearing ? SPRITE.anims['gallop']
               : isGrazing ? SPRITE.anims['idle']
               : SPRITE.anims[animName];

    // Determine frame index
    let frameIdx;
    if (isRearing) {
      // Use gallop frame 0 (legs extended back) — rotation makes it look like a rear
      frameIdx = 0;
    } else if (isGrazing) {
      // Use idle frame 0 (standing) — rotation will tilt head down to the grass
      frameIdx = 0;
    } else if (animName === 'jump') {
      frameIdx = getJumpFrame(jp, jt, anim.frames);
    } else if (animName === 'gallop' || animName === 'trot') {
      // Use timer-based animation at controlled fps (not tied to gallopT)
      spriteAnim.play(animName);
      spriteAnim.update(1/60);
      frameIdx = spriteAnim.frameIndex;
    } else {
      // Idle: use timer-based animation
      spriteAnim.play(animName);
      spriteAnim.update(1/60);
      frameIdx = spriteAnim.frameIndex;
    }

    // Bob (reduced since sprite has its own visual bob)
    let bob = 0;
    if (jp === 'none' && moving && !isRearing) {
      bob = Math.sin(gT * Math.PI * 4) * 1.5;
    }
    const sinkY = horse.onGround ? snowSink : 0;
    const dy = y + bob + sinkY;

    // Source rectangle on sprite sheet
    const sx = frameIdx * SPRITE.fw;
    const sy = anim.row * SPRITE.fh;

    // Destination size
    const dw = SPRITE.fw * SPRITE.scale;
    const dh = SPRITE.fh * SPRITE.scale;

    // Anchor: bottom-center of sprite aligns with (x, dy)
    // dy is the hoof/ground line, so draw upward from there
    const dx = x - dw * 0.45;
    const ddy = dy - dh + 2 * SPRITE.scale; // Spirit sprite has minimal bottom padding

    ctx.save();

    if (isRearing) {
      // Rear up on hind legs: horse faces RIGHT, so hind hooves are on the LEFT.
      // Rotate clockwise (positive angle) around the hind hooves so the
      // front of the horse (head, front legs) lifts UP off the ground.
      const rt = horse.rearT;
      let rearAngle;
      if (rt < 0.35) {
        // Rising up: 0 → 50 degrees with easeOut
        const t = rt / 0.35;
        const ease = 1 - (1 - t) * (1 - t);
        rearAngle = 50 * ease;
      } else if (rt < 1.8) {
        // Holding at peak: slight sway while neighing
        rearAngle = 50 + Math.sin((rt - 0.35) * 4) * 2.5;
      } else {
        // Settling back down: 50 → 0 with easeIn
        const t = Math.min(1, (rt - 1.8) / 0.4);
        const ease = t * t;
        rearAngle = 50 * (1 - ease);
      }
      // Pivot at hind hooves: LEFT side of sprite, at ground level
      // dx is left edge of sprite; hind hooves sit ~25% from the left
      const pivotX = dx + dw * 0.28;
      const pivotY = dy;  // ground line where hooves sit
      ctx.translate(pivotX, pivotY);
      // Negative = counter-clockwise = right side (head) goes UP in canvas coords
      ctx.rotate(-rearAngle * Math.PI / 180);
      ctx.translate(-pivotX, -pivotY);
    }

    if (isGrazing) {
      // Tilt horse forward so head dips down to the grass patch
      // Pivot from front hooves (RIGHT side of sprite, at ground)
      // Positive rotation = clockwise = head (right side) dips DOWN
      const cycle = grazeTimer % 7;
      let grazeAngle;
      if (cycle < 0.4) {
        // Dipping head down: 0 → 20 degrees
        const t = cycle / 0.4;
        const ease = 1 - (1 - t) * (1 - t);
        grazeAngle = 20 * ease;
      } else if (cycle < 4.6) {
        // Grazing: hold with tiny nibble motion
        grazeAngle = 20 + Math.sin(cycle * 3) * 1.5;
      } else if (cycle < 5.0) {
        // Lifting head back up: 20 → 0 degrees
        const t = (cycle - 4.6) / 0.4;
        grazeAngle = 20 * (1 - t);
      } else {
        // Head is up (idle period)
        grazeAngle = 0;
      }
      // Pivot from front hooves — right side of sprite at ground level
      const pivotGX = dx + dw * 0.75;
      const pivotGY = dy;
      ctx.translate(pivotGX, pivotGY);
      ctx.rotate(grazeAngle * Math.PI / 180);
      ctx.translate(-pivotGX, -pivotGY);
    }

    // Eating head-dip when collecting an apple
    if (horse.eating) {
      horse.eatT += 1/60;
      if (horse.eatT > 0.35) {
        horse.eating = false; horse.eatT = 0;
      } else {
        // Quick dip down and back up: sin curve over 0.35s
        const eatAngle = Math.sin((horse.eatT / 0.35) * Math.PI) * 15;
        const pivotEX = dx + dw * 0.75;
        const pivotEY = dy;
        ctx.translate(pivotEX, pivotEY);
        ctx.rotate(eatAngle * Math.PI / 180);
        ctx.translate(-pivotEX, -pivotEY);
      }
    }

    if (SPRITE.flipX) {
      ctx.translate(x, 0);
      ctx.scale(-1, 1);
      ctx.translate(-x, 0);
    }
    ctx.drawImage(horseSprite, sx, sy, SPRITE.fw, SPRITE.fh, dx, ddy, dw, dh);
    ctx.restore();

    // Ground shadow
    const isSnowy = LEVELS[level].obstacleTheme === 'canada' || LEVELS[level].obstacleTheme === 'arctic';
    const isSandy = LEVELS[level].obstacleTheme === 'beach';
    ctx.fillStyle = (isSnowy || isSandy) ? 'rgba(0,0,0,0.12)' : 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(x, horse.targetY + 5, 44, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── FULL HORSE RENDER (OLD — kept as fallback) ──────────────────────────────

  function drawRaven(x, y, gT, jp, jt, moving) {
    let tilt = 0, bob = 0;
    if (jp !== 'none') {
      const p = JUMP_POSES[jp]; tilt = p ? p.tilt : 0;
    } else if (moving) {
      bob = Math.sin(gT * Math.PI * 4) * 3.5;
      tilt = Math.sin(gT * Math.PI * 2) * 0.03;
    }

    // Apply snow sink — horse sinks into soft snow
    const sinkY = horse.onGround ? snowSink : 0;
    const dy = y + bob + sinkY;

    let fl, fr, hl, hr;
    if (jp !== 'none') {
      const p = JUMP_POSES[jp] || { front:[10,0,5], hind:[0,5,5] };
      fl = p.front; fr = [p.front[0]-10, p.front[1]+5, p.front[2]];
      hl = p.hind;  hr = [p.hind[0]-8, p.hind[1]+5, p.hind[2]];
    } else if (moving) {
      const rT = (1 - gT + 1) % 1; // reverse gallop cycle so legs push forward
      fl = getGallopLeg(GALLOP_FRONT, rT);
      fr = getGallopLeg(GALLOP_FRONT, (rT+0.12)%1);
      hl = getGallopLeg(GALLOP_HIND, rT);
      hr = getGallopLeg(GALLOP_HIND, (rT+0.12)%1);
    } else {
      fl = [10,0,5]; fr = [5,2,5]; hl = [-5,5,5]; hr = [-8,8,5];
    }

    // Bigger leg segments for larger horse
    const fSegs = [18,15,12], hSegs = [20,16,12];
    const ct = Math.cos(tilt), st = Math.sin(tilt);
    const rp = (rx,ry) => [x+rx*ct-ry*st, dy+rx*st+ry*ct];

    // Leg attachment points on the larger body
    const [flx,fly] = rp(28,-26), [frx,fry] = rp(32,-26);
    const [hlx,hly] = rp(-36,-24), [hrx,hry] = rp(-32,-24);

    // Draw order: far legs, tail, body, head, mane, near legs
    drawArticulatedLeg(hlx, hly, hl[0], hl[1], hl[2], hSegs, '#0a0a0a');
    drawArticulatedLeg(flx, fly, fl[0], fl[1], fl[2], fSegs, '#0a0a0a');
    drawTailHair(x, dy, tilt, gT, moving);
    drawRavenBody(x, dy, tilt);
    drawRavenHead(x, dy, tilt);
    drawMane(x, dy, tilt, gT, moving);
    drawArticulatedLeg(hrx, hry, hr[0], hr[1], hr[2], hSegs, '#141414');
    drawArticulatedLeg(frx, fry, fr[0], fr[1], fr[2], fSegs, '#141414');

    // Ground shadow (dimmer on snow/sand since it's lighter)
    const isSnowy = LEVELS[level].obstacleTheme === 'canada' || LEVELS[level].obstacleTheme === 'arctic';
    const isSandy = LEVELS[level].obstacleTheme === 'beach';
    ctx.fillStyle = (isSnowy || isSandy) ? 'rgba(0,0,0,0.12)' : 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(x, horse.targetY + 5, 44, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // drawSnowCover removed — clipping is now done around drawRaven call

  // ── Lane indicators ────────────────────────────────────────────────────────

  function drawLaneIndicators() {
    obstacles.forEach(obs => {
      const dist = obs.x - hsx;
      if (dist > 200 && dist < 420) {
        const alpha = Math.max(0, 1 - (dist-200)/220);
        const ax = obs.x - 18;
        const groundY = obs.lane === 0 ? lowerAt(obs.x) : upperAt(obs.x);
        const ay = groundY - 55;
        ctx.save(); ctx.globalAlpha = alpha * 0.65;
        ctx.fillStyle = obs.lane === 0 ? '#ffcc44' : '#44ccff';
        ctx.beginPath();
        ctx.moveTo(ax, ay); ctx.lineTo(ax-10, ay-16); ctx.lineTo(ax-4, ay-16);
        ctx.lineTo(ax-4, ay-28); ctx.lineTo(ax+4, ay-28); ctx.lineTo(ax+4, ay-16);
        ctx.lineTo(ax+10, ay-16); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    });
  }

  // ── HUD ───────────────────────────────────────────────────────────────────

  function drawHUD() {
    // High score box (top right, wider to fit both scores)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(W-260, 12, 248, 38, 8); ctx.fill();
    // High score label + value
    ctx.fillStyle = '#aab8cc'; ctx.font = '13px Arial'; ctx.textAlign = 'right';
    ctx.fillText('High Score: ' + Math.floor(highScore), W-158, 36);
    // Divider
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(W-152, 18, 1, 26);
    // Current score
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'right';
    ctx.fillText('\uD83C\uDF4E ' + score, W-20, 38); ctx.textAlign = 'left';
    // Lane indicator (bottom left)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.roundRect(14, 12, 105, 38, 8); ctx.fill();
    ctx.fillStyle = horse.lane === 1 ? '#44ccff' : '#ffcc44';
    ctx.font = '15px Arial';
    ctx.fillText(horse.lane === 1 ? '\u2191 Upper path' : '\u2193 Lower path', 22, 36);
  }

  function drawProgressBar() {
    const progress = Math.min(1, worldOffset / LEVELS[level].finishAt);
    const barW = 200, barH = 8, barX = W/2 - barW/2, barY = 6;
    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
    // Fill
    ctx.fillStyle = progress < 0.8 ? '#44dd66' : '#ffdd44';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, barH, 4); ctx.fill();
    // Label
    ctx.fillStyle = '#fff'; ctx.font = '11px Arial'; ctx.textAlign = 'center';
    ctx.fillText(LEVELS[level].label + '  ' + Math.floor(progress * 100) + '%', W/2, 26);
    ctx.textAlign = 'left';
  }

  function drawFinishLine() {
    const finishWX = LEVELS[level].finishAt;
    const finishSX = finishWX - worldOffset;
    if (finishSX > W + 100 || finishSX < -60) return; // off screen

    // Draw checkered posts on both paths
    const paths = [lowerAt(finishSX), upperAt(finishSX)];
    for (const groundY of paths) {
      const postH = 80, postW = 10;
      const px = finishSX, py = groundY - postH;
      // Post
      ctx.fillStyle = '#fff';
      ctx.fillRect(px - postW/2, py, postW, postH);
      // Checkerboard pattern on post
      const sq = 10;
      for (let row = 0; row < postH / sq; row++) {
        for (let col = 0; col < 1; col++) {
          if ((row + col) % 2 === 0) {
            ctx.fillStyle = '#111';
            ctx.fillRect(px - postW/2, py + row * sq, postW, sq);
          }
        }
      }
    }
    // Banner between the posts
    const bannerY = Math.min(paths[0], paths[1]) - 80;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.roundRect(finishSX - 30, bannerY - 5, 60, 22, 4); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
    ctx.fillText('FINISH', finishSX, bannerY + 12);
    ctx.textAlign = 'left';
  }

  function drawOverlay(lines, colors) {
    const bh = lines.length * 38 + 22;
    ctx.fillStyle = 'rgba(0,0,10,0.62)';
    ctx.beginPath(); ctx.roundRect(W/2-230, 115, 460, bh, 14); ctx.fill();
    lines.forEach((t, i) => {
      ctx.fillStyle = colors[i] || '#fff';
      ctx.font = i === 0 ? 'bold 32px Arial' : '19px Arial';
      ctx.textAlign = 'center'; ctx.fillText(t, W/2, 153 + i*38);
    });
    ctx.textAlign = 'left';
  }

  // ── Collision ──────────────────────────────────────────────────────────────

  function checkCollision(obs) {
    const hp = horse.lane;
    if (obs.lane !== hp) return false;
    const gy = obs.lane === 0 ? lowerAt(obs.x) : upperAt(obs.x);
    const oy = gy - obs.h;
    const hx = hsx - 20, hy = horse.y - 100, hw = 60, hh = 100;
    return hx < obs.x + obs.w && hx + hw > obs.x && hy < oy + obs.h && hy + hh > oy;
  }

  function spawnObstacle() {
    const lane = Math.random() < 0.5 ? 0 : 1;
    const r = Math.random();
    let w, h, type;
    const theme = LEVELS[level].obstacleTheme;

    if (theme === 'paris') {
      // Café tables and flower carts
      if (LEVELS[level].smallOnly) {
        if (r < 0.5) { w=40; h=35; type='cafe_table'; }
        else         { w=38; h=30; type='flower_cart'; }
      } else {
        if (r < 0.5) { w=48; h=42; type='cafe_table'; }
        else         { w=55; h=40; type='flower_cart'; }
      }
    } else if (theme === 'canada') {
      // Ice chunks and snow logs
      if (LEVELS[level].smallOnly) {
        if (r < 0.5) { w=42; h=38; type='ice_chunk'; }
        else         { w=40; h=28; type='snow_log'; }
      } else {
        if (r < 0.5) { w=55; h=48; type='ice_chunk'; }
        else         { w=52; h=30; type='snow_log'; }
      }
    } else if (theme === 'kentucky') {
      // Hay bales and wooden crates
      if (LEVELS[level].smallOnly) {
        if (r < 0.5) { w=44; h=38; type='hay_bale'; }
        else         { w=38; h=35; type='wooden_crate'; }
      } else {
        if (r < 0.5) { w=55; h=48; type='hay_bale'; }
        else         { w=45; h=42; type='wooden_crate'; }
      }
    } else if (theme === 'michigan') {
      // Deer and pumpkins
      if (r < 0.5) { w=50; h=48; type='deer'; }
      else         { w=40; h=35; type='pumpkin'; }
    } else if (theme === 'texas') {
      // Cactus obstacles and rattlesnakes
      if (r < 0.5) { w=35; h=50; type='cactus_obs'; }
      else         { w=50; h=25; type='rattlesnake'; }
    } else if (theme === 'arctic') {
      // Ice blocks and snow drifts
      if (r < 0.5) { w=50; h=45; type='ice_block'; }
      else         { w=55; h=30; type='snow_drift'; }
    } else if (theme === 'beach') {
      // Bodyboarders
      w = 55; h = 35; type = 'bodyboarder';
    } else if (theme === 'city') {
      // Cars (handled by car hazard system, but also normal obstacles)
      w = 60; h = 35; type = 'fire_hydrant';
      if (r > 0.5) { w = 40; h = 45; type = 'trash_can'; }
    } else {
      // Default mountain obstacles
      if (LEVELS[level].smallOnly) {
        if (r < 0.5) { w=44; h=40; type='boulder'; }
        else         { w=40; h=30; type='log'; }
      } else {
        if (r < 0.28)      { w=44; h=40; type='boulder'; }
        else if (r < 0.52) { w=62; h=56; type='boulder'; }
        else if (r < 0.76) { w=58; h=30; type='log'; }
        else               { w=40; h=50; type='log'; }
      }
    }
    if (lane === 1) { w = Math.round(w*0.82); h = Math.round(h*0.82); }
    obstacles.push({ x: W+20, w, h, type, lane });
  }

  // ── Jump state machine ────────────────────────────────────────────────────

  function updateJumpPhase() {
    if (horse.jumpPhase === 'none') return;
    horse.jumpT += 0.06;
    switch (horse.jumpPhase) {
      case 'gather': if (horse.jumpT > 0.3) { horse.jumpPhase = 'launch'; horse.jumpT = 0; } break;
      case 'launch': if (horse.vy > -6) { horse.jumpPhase = 'tuck'; horse.jumpT = 0; } break;
      case 'tuck':   if (horse.vy > 2) { horse.jumpPhase = 'extend'; horse.jumpT = 0; } break;
      case 'extend': if (horse.vy > 6) { horse.jumpPhase = 'land'; horse.jumpT = 0; } break;
      case 'land':   if (horse.onGround) { horse.jumpPhase = 'none'; horse.jumpT = 0; } break;
    }
  }

  // ── Game Loop ─────────────────────────────────────────────────────────────

  function gameLoop() {
    if (state === 'playing') {
      frame++;
      // speed gradually increases as you collect more apples
      speed = LEVELS[level].speed + Math.floor(score / 15) * 0.5;
      worldOffset += speed;

      // Finish line check — trigger when the horse visually crosses the finish line
      const finishScreenX = LEVELS[level].finishAt - worldOffset;
      if (finishScreenX <= hsx) {
        state = 'won';
        // Clear all hazards
        obstacles = []; lavaFlows = []; rollingBoulders = []; hazardCars = []; apples = [];
        spawnConfetti();
        // Victory rear + neigh!
        horse.rearing = true; horse.rearT = 0;
        horse.jumpPhase = 'none'; horse.jumpT = 0;
        gallopAudio.pause(); gallopPlaying = false;
        neighAudio.currentTime = 0; neighAudio.play().catch(()=>{});
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('ravenHighScore', String(highScore));
        }
      }

      // Raven gallops FORWARD — her screen X actually increases!
      // Each gallop stride pushes her forward a bit
      const strideForward = Math.sin(horse.gallopT * Math.PI * 2);
      if (strideForward > 0.8) hsx += 0.6;  // push forward on each stride peak

      // Camera catch-up: when Raven gets too far right, camera pulls her back
      if (hsx > CAMERA_PULL_START) {
        // Camera "scrolls" to catch up — pull horse back toward center
        cameraSpeed = lerp(cameraSpeed, (hsx - CAMERA_PULL_START) * 0.08, 0.15);
        hsx -= cameraSpeed;
      } else {
        cameraSpeed *= 0.9; // ease off camera pull
      }

      // Keep her on screen
      hsx = Math.max(HORSE_MIN_SX, Math.min(HORSE_MAX_SX, hsx));

      // Gallop bounce on top of the running position
      hsx += Math.sin(horse.gallopT * Math.PI * 2) * 3;

      horse.gallopT = (horse.gallopT + 0.018 * speed) % 1;

      // Lane transition — hop arc between paths
      if (horse.laneHopping) {
        horse.laneHopT += 0.04;  // ~0.4s hop duration at 60fps
        if (horse.laneHopT >= 1) {
          horse.laneHopT = 1;
          horse.laneHopping = false;
          horse.y = horse.targetY;
          horse.onGround = true;
          horse.vy = 0;
          horse.jumpPhase = 'none';
          horse.jumpT = 0;
        } else {
          const t = horse.laneHopT;
          // Linear lerp for horizontal progress + parabolic arc for the hop
          const straight = horse.laneHopFrom + (horse.targetY - horse.laneHopFrom) * t;
          const arc = -Math.sin(t * Math.PI) * 40;  // 40px hop peak
          horse.y = straight + arc;
        }
      }

      // Gravity — hold space to jump higher, but cap at apple height
      const maxRise = 85; // max pixels above ground — half height, same airtime
      if (!horse.onGround) {
        wasInAir = true;
        const risen = horse.targetY - horse.y; // how high above ground
        if (spaceHeld && horse.vy < 0 && risen < maxRise) {
          horse.vy += GRAVITY * 0.55;  // lighter gravity while holding
        } else {
          horse.vy += GRAVITY;          // normal gravity (falling or capped)
        }
        horse.y += horse.vy;
        if (horse.y >= horse.targetY) {
          horse.y = horse.targetY;
          horse.vy = 0;
          horse.onGround = true;

          // Snow/sand sink on landing
          const th = LEVELS[level].obstacleTheme;
          if ((th === 'canada' || th === 'arctic') && wasInAir) {
            snowSink = 8;    // deep sink on landing in snow
            snowSinkV = 0;
            // Snow burst particles
            for (let i = 0; i < 12; i++) {
              snowBursts.push({
                x: hsx - 20 + Math.random() * 40,
                y: horse.y - 2,
                vx: (Math.random() - 0.5) * 5,
                vy: -1.5 - Math.random() * 3,
                life: 1,
                size: 2 + Math.random() * 4,
              });
            }
          }
          if (th === 'beach' && wasInAir) {
            snowSink = 4;   // lighter sink on sand
            snowSinkV = 0;
            // Sand spray
            for (let i = 0; i < 8; i++) {
              snowBursts.push({
                x: hsx - 15 + Math.random() * 30,
                y: horse.y - 2,
                vx: (Math.random() - 0.5) * 4,
                vy: -1 - Math.random() * 2,
                life: 0.8,
                size: 1.5 + Math.random() * 3,
              });
            }
          }
          wasInAir = false;
        }
      }

      // Snow/sand sink physics — hooves sinking and recovering
      const curTheme = LEVELS[level].obstacleTheme;
      const isSnowy = curTheme === 'canada' || curTheme === 'arctic';
      const isSandy = curTheme === 'beach';
      if ((isSnowy || isSandy) && horse.onGround) {
        // Gallop sink: hooves push into soft surface on each stride
        const stridePhase = Math.sin(horse.gallopT * Math.PI * 4); // 2 hoof-strikes per cycle
        const baseSink = isSnowy ? 2.5 : 1.2;
        const sinkAmp = isSnowy ? 1.5 : 0.8;
        const gallopSink = baseSink + stridePhase * sinkAmp;
        // Blend gallop sink with landing sink (landing sink decays)
        if (snowSink > gallopSink) {
          snowSink += (gallopSink - snowSink) * 0.08; // slowly recover from deep landing
        } else {
          snowSink = gallopSink;
        }
      } else if (!isSnowy && !isSandy) {
        snowSink = 0;
      }
      // Update snow bursts
      snowBursts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.03; p.size *= 0.98; });
      snowBursts = snowBursts.filter(p => p.life > 0);

      updateJumpPhase();

      // Spawn obstacles (stop near finish line so the ending is clean)
      const nearFinish = worldOffset >= LEVELS[level].finishAt - 800;
      nextObsIn--;
      if (nextObsIn <= 0 && !nearFinish) {
        spawnObstacle();
        const baseObs = LEVELS[level].obsInterval;
        nextObsIn = Math.max(48, baseObs + Math.random() * 65 - Math.floor(score / 500) * 7);
      }

      // Spawn trees
      nextTreeIn--;
      if (nextTreeIn <= 0) {
        spawnTree();
        nextTreeIn = 50 + Math.random() * 120;
      }

      // Spawn apples
      nextAppleIn--;
      if (nextAppleIn <= 0) {
        spawnApples();
        nextAppleIn = LEVELS[level].appleInterval + Math.random() * 50;
      }

      // Move obstacles & trees & apples
      obstacles.forEach(o => o.x -= speed);
      obstacles = obstacles.filter(o => o.x + o.w > -20);
      trees.forEach(t => t.x -= speed);
      trees = trees.filter(t => t.x + t.size > -60);
      apples.forEach(a => { a.x -= speed; a.bob += 0.06; });
      apples = apples.filter(a => a.x > -20);

      // Collect apples
      checkAppleCollect();
      updateCollectFx();

      // Dust
      if (frame % 3 === 0) emitDust();
      updateDust();

      // Rolling boulders (level 3 only)
      if (LEVELS[level].hazard === 'boulders' || LEVELS[level].hazard === 'both') {
        nextBoulderIn--;
        if (nextBoulderIn <= 0) {
          spawnRollingBoulder();
          nextBoulderIn = 80 + Math.random() * 90;
        }
        updateRollingBoulders();
      }

      // Lava (level 4 only)
      if (LEVELS[level].hazard === 'lava' || LEVELS[level].hazard === 'both') {
        nextLavaIn--;
        if (nextLavaIn <= 0) {
          spawnLava();
          nextLavaIn = 70 + Math.random() * 80;
        }
        lavaFlows.forEach(lv => lv.x -= speed);
        lavaFlows = lavaFlows.filter(lv => lv.x + lv.w > -20);
      }

      // Collision — skip near finish line so you can't die at the very end
      if (!nearFinish) {
        for (const obs of obstacles) {
          if (checkCollision(obs)) {
            state = 'dead'; stateTime = Date.now();
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('ravenHighScore', String(highScore));
            }
            break;
          }
        }

        // Lava collision (level 4)
        if ((LEVELS[level].hazard === 'lava' || LEVELS[level].hazard === 'both') && state === 'playing' && checkLavaCollision()) {
          state = 'dead'; stateTime = Date.now();
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('ravenHighScore', String(highScore));
          }
        }

        // Rolling boulder collision (level 3)
        if ((LEVELS[level].hazard === 'boulders' || LEVELS[level].hazard === 'both') && state === 'playing' && checkBoulderCollision()) {
          state = 'dead'; stateTime = Date.now();
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('ravenHighScore', String(highScore));
          }
        }
      }

      // Hazard cars (NYC level) — stop spawning near finish
      if (LEVELS[level].hazard === 'cars') {
        nextCarIn--;
        if (nextCarIn <= 0 && !nearFinish) {
          spawnHazardCar();
          nextCarIn = 55 + Math.random() * 70;
        }
        updateHazardCars();
      }

      // Car collision — skip near finish
      if (!nearFinish && LEVELS[level].hazard === 'cars' && state === 'playing' && checkCarCollision()) {
        state = 'dead'; stateTime = Date.now();
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('ravenHighScore', String(highScore));
        }
      }

    }

    // Rear animation — horse stands on hind legs, then settles (works in any state)
    if (horse.rearing) {
      horse.rearT += 1 / 60;  // ~60fps timer
      // Rear lasts ~1.8s (matches neigh), then settle back down over 0.4s
      if (horse.rearT > 2.2) {
        horse.rearing = false;
        horse.rearT = 0;
      }
    }

    // Advance graze timer on waiting screen
    if (state === 'waiting') {
      grazeTimer += 1 / 60;
    }

    // ── Audio: gallop loop ─────────────────────────────────────────────────
    const shouldGallop = state === 'playing' && horse.onGround;
    if (shouldGallop && !gallopPlaying) {
      gallopAudio.play().catch(()=>{});
      gallopPlaying = true;
    }
    if (!shouldGallop && gallopPlaying) {
      gallopAudio.pause();
      gallopPlaying = false;
    }

    // ── Draw ──────────────────────────────────────────────────────────────
    drawSky();
    drawClouds();
    drawMountains();
    drawUpperLedge();
    drawLowerGround();
    drawTrees();
    drawLaneIndicators();

    // Draw obstacles on terrain
    obstacles.forEach(o => {
      const gy = o.lane === 0 ? lowerAt(o.x) : upperAt(o.x);
      const ox = o.x, oy = gy - o.h, ow = o.w, oh = o.h;
      switch(o.type) {
        case 'boulder': drawBoulder(ox, oy, ow, oh); break;
        case 'log': drawLog(ox, oy, ow, oh); break;
        case 'cafe_table': drawCafeTable(ox, oy, ow, oh); break;
        case 'flower_cart': drawFlowerCart(ox, oy, ow, oh); break;
        case 'ice_chunk': drawIceChunk(ox, oy, ow, oh); break;
        case 'snow_log': drawSnowLog(ox, oy, ow, oh); break;
        case 'hay_bale': drawHayBale(ox, oy, ow, oh); break;
        case 'wooden_crate': drawWoodenCrate(ox, oy, ow, oh); break;
        case 'deer': drawDeer(ox, oy, ow, oh); break;
        case 'pumpkin': drawPumpkin(ox, oy, ow, oh); break;
        case 'cactus_obs': drawCactusObs(ox, oy, ow, oh); break;
        case 'rattlesnake': drawRattlesnake(ox, oy, ow, oh); break;
        case 'ice_block': drawIceBlock(ox, oy, ow, oh); break;
        case 'snow_drift': drawSnowDrift(ox, oy, ow, oh); break;
        case 'bodyboarder': drawBodyboarder(ox, oy, ow, oh); break;
        case 'fire_hydrant': drawFireHydrant(ox, oy, ow, oh); break;
        case 'trash_can': drawTrashCan(ox, oy, ow, oh); break;
        default: drawBoulder(ox, oy, ow, oh);
      }
    });

    drawApples();
    if (LEVELS[level].hazard === 'boulders' || LEVELS[level].hazard === 'both') drawRollingBoulders();
    if (LEVELS[level].hazard === 'lava' || LEVELS[level].hazard === 'both') drawLava();
    if (LEVELS[level].hazard === 'cars') drawHazardCars();
    // On soft surfaces (snow/sand), clip the horse so legs below ground aren't drawn
    // This makes hooves naturally disappear into the surface — no fake cover needed
    const _th = LEVELS[level].obstacleTheme;
    const _soft = (_th === 'canada' || _th === 'arctic' || _th === 'beach') && horse.onGround && snowSink > 0.5;
    if (_soft) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, W, horse.targetY);  // only draw above the ground surface
      ctx.clip();
    }
    // Draw a little grass patch on waiting screen right where the horse's mouth grazes
    if (state === 'waiting') {
      const gx = hsx + 100;  // right at Spirit's nose when head is down
      const gy = horse.y - 2; // just at ground level
      ctx.save();
      // Grass blades — a small tuft growing up from the ground
      const greens = ['#2a7a22','#3a9930','#2e8828','#4aaa38','#358830'];
      for (let i = 0; i < 14; i++) {
        const bx = gx - 16 + i * 2.3 + Math.sin(i * 2.3) * 2;
        const bh = 6 + Math.sin(i * 1.7) * 3;  // short blades
        const sway = Math.sin(grazeTimer * 1.2 + i * 0.8) * 1.2;
        ctx.strokeStyle = greens[i % greens.length];
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(bx, gy);
        ctx.quadraticCurveTo(bx + sway, gy - bh * 0.6, bx + sway * 1.5, gy - bh);
        ctx.stroke();
      }
      // Ground base
      ctx.fillStyle = '#3a7a28';
      ctx.beginPath();
      ctx.ellipse(gx, gy + 1, 20, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    drawHorseSprite(hsx, horse.y, horse.gallopT, horse.jumpPhase, horse.jumpT, state === 'playing');
    if (_soft) {
      ctx.restore();
    }
    drawCollectFx();
    drawDust();
    drawFinishLine();
    updateConfetti();
    drawConfetti();
    drawHUD();
    if (state === 'playing') drawProgressBar();

    if (state === 'waiting') {
      drawOverlay(
        ['\uD83D\uDC0E  Wild Stallion \u2014 Spirit', 'Press 1-8 to pick a level  |  SPACE to start', 'SPACE = jump  |  \u2191 \u2193 = switch paths'],
        ['#ffe87a', '#88ffaa', '#aaccff']
      );
    }
    if (state === 'dead') {
      const isNew = score > highScore;
      drawOverlay(
        isNew
          ? ['\uD83C\uDFC6  New High Score!', '\uD83C\uDF4E Apples: ' + score, 'Press SPACE to continue']
          : ['Oh no! \uD83D\uDCA5', '\uD83C\uDF4E Apples: ' + score, 'Press SPACE to continue'],
        isNew
          ? ['#ffe87a', '#ffe87a', '#cccccc']
          : ['#ff6b6b', '#ffe87a', '#cccccc']
      );
    }
    if (state === 'won') {
      if (level < 8) {
        const nextTheme = LEVELS[level + 1].theme;
        drawOverlay(
          ['\uD83C\uDF89  ' + LEVELS[level].theme + ' Complete!', '\uD83C\uDF4E Apples: ' + score, 'Press SPACE for ' + nextTheme + '!'],
          ['#88ffaa', '#ffe87a', '#cccccc']
        );
      } else {
        drawOverlay(
          ['\uD83C\uDFC6  You Beat All 8 Levels!', '\uD83C\uDF4E Total Apples: ' + score, 'Amazing job! Press SPACE to play again'],
          ['#ffe87a', '#88ffaa', '#cccccc']
        );
      }
    }

    requestAnimationFrame(gameLoop);
  }

  gameLoop();
  </script>
</body>
</html>
